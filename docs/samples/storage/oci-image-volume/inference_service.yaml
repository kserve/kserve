# Demonstration: oci+native:// storageUri with Kubernetes-native ImageVolume
#
# This sample deploys an InferenceService using the oci+native:// URI scheme,
# which instructs KServe to mount the model container image directly as a
# Kubernetes ImageVolume (KEP-4639) rather than running a modelcar sidecar.
#
# Prerequisites:
#   - Kubernetes >= 1.33 (ImageVolume beta, gate enabled by default)
#     OR Kubernetes 1.31–1.32 with --feature-gates=ImageVolume=true on
#     kube-apiserver and kubelet nodes.
#   - KServe installed with inferenceservice-config updated (see configmap.yaml
#     below, OR use the oci+native:// scheme directly as shown here — the
#     explicit scheme always overrides the global default).
#   - A container runtime that supports the ImageVolume volume type
#     (containerd >= 2.0 or CRI-O >= 1.31).
#
# How the scheme works:
#   storageUri: oci+native://<image-ref>
#     → webhook materialises as spec.volumes[].image.reference = <image-ref>
#     → kserve-container gets a read-only VolumeMount at /mnt/models
#
# Replace the storageUri below with your own OCI model image reference.
# The image must serve model files at /mnt/models inside the container.

---
# Optional: override the global ociModelMode for all InferenceServices in the
# cluster.  Using the explicit oci+native:// URI scheme (below) is sufficient
# for a single service and does not require this ConfigMap change.
# Uncomment and apply with: kubectl apply -f - <<EOF ... EOF
#
# apiVersion: v1
# kind: ConfigMap
# metadata:
#   name: inferenceservice-config
#   namespace: kserve
# data:
#   storageInitializer: |-
#     {
#       "enableOciModelSupport": true,
#       "ociModelMode": "native"
#     }

---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: sklearn-oci-native
  namespace: kserve-test
spec:
  predictor:
    model:
      modelFormat:
        name: sklearn
      # oci+native:// forces Kubernetes-native ImageVolume mounting regardless
      # of the cluster-wide ociModelMode setting in inferenceservice-config.
      # Replace with your OCI model image reference.
      storageUri: "oci+native://ghcr.io/my-org/my-sklearn-model:v1"
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
