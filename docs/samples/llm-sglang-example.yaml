# Example: Deploy an LLM using SGLang runtime
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: llama-sglang
spec:
  runtime: sglang   # <-- Use SGLang runtime (default: vllm)
  model:
    uri: "hf://meta-llama/Llama-2-7b-hf"
    name: llama2
  replicas: 1
  baseRefs:
    - name: kserve-config-llm-sglang-template
---
# Example: Deploy an LLM using vLLM runtime (default)
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: llama-vllm
spec:
  runtime: vllm   # <-- (optional) Explicitly use vLLM runtime
  model:
    uri: "hf://meta-llama/Llama-2-7b-hf"
    name: llama2
  replicas: 1
  baseRefs:
    - name: kserve-config-llm-template