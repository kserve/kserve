apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: sglang-opt-125m-single
spec:
  runtime: kserve-llm-sglang
  model:
    uri: hf://facebook/opt-125m
    name: facebook/opt-125m
  replicas: 1
  router:
    scheduler: {}
    route: {}
    gateway: {}
  template:
    containers:
      - name: main
        resources:
          limits:
            cpu: '4'
            memory: 16Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: '1'
            memory: 8Gi
            nvidia.com/gpu: "1"
