# Qwen3-32B FP8 with Eagle3 Speculative Decoding — 4 replicas × TP=2
#
# Hardware sizing rationale (H100 80GB GPUs, 8 total):
#
#   Model weights per replica (FP8):
#     - Qwen3-32B FP8: 32.8B params × 1 byte (FP8) ≈ 33 GB
#     - Eagle3 speculator head: ~2B params × 2 bytes (BF16) ≈ 4 GB
#     - Total model memory per replica: ~37 GB
#
#   Per-GPU with TP=2:
#     - Model weights: 37 GB / 2 GPUs ≈ 18.5 GB per GPU
#     - Remaining for KV cache + overhead: 80 - 18.5 - 2 (CUDA) ≈ 59.5 GB per GPU
#
#   KV cache per token (GQA: 8 KV heads, 64 layers, head_dim=128):
#     - Per token: 2 (K+V) × 8 heads × 128 dim × 64 layers × 2 bytes = 2.0 MB
#     - With ~59 GB free per GPU: ~30,000 tokens of KV cache per GPU
#
#   Why TP=2:
#     - Qwen3-32B has 64 attention heads and 8 KV heads, both divisible by 2
#     - FP8 halves model memory vs BF16 (33 GB vs 66 GB), making TP=2 feasible
#     - TP=4 would work but wastes GPUs — the model fits comfortably on 2
#     - TP=1 is tight: 37 GB model + KV cache on a single 80 GB GPU
#
#   Why FP8 for the target but BF16 for the speculator:
#     - H100 has native FP8 tensor cores — at 32B+ params, memory bandwidth
#       is the bottleneck, so FP8 gives ~2x matrix-multiply throughput
#     - Accuracy recovery is 100.1% on OpenLLM v1 — effectively lossless
#     - The Eagle3 speculator head is only ~2B params (~4 GB). Quantizing it
#       saves ~2 GB but risks degrading acceptance rates, which directly
#       reduces the speculative decoding speedup. Not worth it.
#
#   Why 4 replicas:
#     - 4 replicas × 2 GPUs/replica = 8 H100s total
#     - Horizontal scaling behind KServe's scheduler enables load-balanced
#       routing across replicas, maximizing throughput at high request rates
#     - Speculative decoding shines at low per-replica request rates (where
#       acceptance rates are highest), so spreading load across replicas
#       keeps each replica in the optimal operating region
#
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: qwen32b-eagle3-speculative
  namespace: greg
spec:
  model:
    uri: hf://RedHatAI/Qwen3-32B-FP8-dynamic
    name: RedHatAI/Qwen3-32B-FP8-dynamic
  replicas: 4
  router:
    scheduler: {}
    route: {}
    gateway: {}
  template:
    containers:
      - name: main
        env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: llm-d-hf-token
                key: HF_TOKEN
          - name: VLLM_USE_V1
            value: "1"
          - name: VLLM_ADDITIONAL_ARGS
            value: >-
              --tensor-parallel-size 2
              --speculative-config '{"model": "RedHatAI/Qwen3-32B-speculator.eagle3", "num_speculative_tokens": 3, "method": "eagle3", "draft_tensor_parallel_size": 1}'
        resources:
          requests:
            cpu: "4"
            memory: 32Gi
            nvidia.com/gpu: "2"
          limits:
            cpu: "8"
            memory: 64Gi
            nvidia.com/gpu: "2"
