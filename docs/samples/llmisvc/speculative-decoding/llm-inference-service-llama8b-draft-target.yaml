# Llama 3.1 8B + Llama 3.2 1B Draft-Target Speculative Decoding — 8 replicas × 1 GPU
#
# Hardware sizing rationale (H100 80GB GPUs, 8 total):
#
#   Model weights per replica (BF16):
#     - Llama-3.1-8B target: 8B params × 2 bytes (BF16) ≈ 16 GB
#     - Llama-3.2-1B draft: 1.2B params × 2 bytes (BF16) ≈ 2.4 GB
#     - Total model memory per replica: ~18.4 GB
#
#   Per-GPU (no TP, single GPU per replica):
#     - Model weights: ~18.4 GB
#     - Remaining for KV cache + overhead: 80 - 18.4 - 2 (CUDA) ≈ 59.6 GB
#
#   KV cache per token — both models maintain separate KV caches:
#     - Target (8B): 2 × 8 KV heads × 128 dim × 32 layers × 2 bytes = 1.0 MB/token
#     - Draft (1B): 2 × 8 KV heads × 64 dim × 16 layers × 2 bytes = 0.25 MB/token
#     - Combined: ~1.25 MB/token
#     - With ~59 GB free: ~47,000 tokens of combined KV cache
#
#   Why BF16 (no quantization):
#     - At 8B params, the model is compute-bound, not memory-bound on H100
#     - FP8 only gives ~11% throughput improvement at this scale
#     - BF16 keeps the example simple and avoids unnecessary complexity
#     - The draft model (1B) is too small for quantization to matter
#
#   Why 1 GPU per replica (no TP):
#     - Both models fit easily on a single H100 with 59 GB KV cache headroom
#     - No inter-GPU communication overhead = lowest possible latency
#     - Simpler scheduling — each replica is a single pod on a single GPU
#
#   Why 8 replicas:
#     - 8 replicas × 1 GPU/replica = 8 H100s total (same budget as Eagle3 example)
#     - Maximum horizontal scale-out: KServe scheduler distributes requests
#       across 8 independent replicas
#     - Each replica stays at low utilization where draft-target acceptance
#       rates are highest, maximizing the speculative decoding benefit
#
#   Draft-target vs Eagle3 tradeoffs:
#     - Draft-target loads a full separate model (~2.4 GB) vs Eagle3 head (~4 GB)
#     - Draft-target requires both models to share the same vocabulary/tokenizer
#       (Llama 3.1 8B and Llama 3.2 1B are from the same model family)
#     - Eagle3 generally has higher acceptance rates for the same token budget
#       but requires a purpose-trained speculator head
#     - Draft-target works with any compatible model pair — no special training
#
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: llama8b-draft-target-speculative
  namespace: greg
spec:
  model:
    uri: hf://meta-llama/Llama-3.1-8B-Instruct
    name: meta-llama/Llama-3.1-8B-Instruct
  replicas: 8
  router:
    scheduler: {}
    route: {}
    gateway: {}
  template:
    containers:
      - name: main
        env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: llm-d-hf-token
                key: HF_TOKEN
          - name: VLLM_USE_V1
            value: "1"
          - name: VLLM_ADDITIONAL_ARGS
            value: >-
              --speculative-config '{"model": "meta-llama/Llama-3.2-1B-Instruct", "num_speculative_tokens": 5, "method": "draft_model"}'
        resources:
          requests:
            cpu: "2"
            memory: 16Gi
            nvidia.com/gpu: "1"
          limits:
            cpu: "4"
            memory: 32Gi
            nvidia.com/gpu: "1"
