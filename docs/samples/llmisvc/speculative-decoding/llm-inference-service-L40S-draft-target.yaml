# Llama 3.1 8B + Llama 3.2 1B Draft-Target Speculative Decoding — 8 replicas × TP1 × L40S
#
# Mid-size density / inference efficiency example. L40S has 48 GB VRAM — enough for
# both models in BF16 but tighter than A100/H100, so we cap max-model-len at 4096
# and push gpu_memory_utilization to 0.92 to maximize KV cache capacity.
#
# Hardware sizing (L40S 48GB GPUs):
#   - Llama-3.1-8B BF16: ~16 GB
#   - Llama-3.2-1B BF16: ~2.4 GB
#   - Total: ~18.4 GB → fits on 1× L40S with gpu_memory_utilization=0.92
#   - Remaining for KV cache: 48 × 0.92 - 18.4 - 2 (CUDA) ≈ 23.8 GB
#   - max-model-len capped at 4096 to keep memory bounded on 48 GB cards
#
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: llama8b-draft-target-l40s
  namespace: grpereir-dev
spec:
  model:
    uri: hf://meta-llama/Llama-3.1-8B-Instruct
    name: meta-llama/Llama-3.1-8B-Instruct
  replicas: 8
  speculativeDecoding:
    method: draft_model
    numSpeculativeTokens: 5
    speculator:
      model:
        uri: hf://meta-llama/Llama-3.2-1B-Instruct
      tensorParallelSize: 1
      maxModelLen: 4096
  router:
    scheduler: {}
    route: {}
    gateway:
      refs:
        - name: spec-decoding-gateway
          namespace: grpereir-dev
  template:
    containers:
      - name: main
        env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: llm-d-hf-token
                key: HF_TOKEN
          - name: VLLM_USE_V1
            value: "1"
          - name: VLLM_ADDITIONAL_ARGS
            value: "--max-model-len 4096 --gpu-memory-utilization 0.92"
        resources:
          requests:
            cpu: "2"
            memory: 16Gi
            nvidia.com/gpu: "1"
          limits:
            cpu: "4"
            memory: 32Gi
            nvidia.com/gpu: "1"
