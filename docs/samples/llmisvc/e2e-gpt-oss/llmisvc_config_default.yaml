---
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: llmisvc-intelligent-inference-scheduling
spec:
  template:
    containers:
      # Override image version and command from base config
      - image: ghcr.io/llm-d/llm-d-cuda:v0.5.1
        name: main
        command: ["/bin/sh", "-c"]
        args:
          - >
            vllm serve /mnt/models
            --served-model-name "{{ .Spec.Model.Name }}"
            --port 8000
            --disable-uvicorn-access-log
            --disable-log-requests
            $VLLM_ADDITIONAL_ARGS
        # Override security context
        securityContext:
          runAsNonRoot: true
        # Override liveness probe initial delay
        livenessProbe:
          initialDelaySeconds: 1200
        # Override readiness probe settings
        readinessProbe:
          initialDelaySeconds: 10
          periodSeconds: 10
  router:
    scheduler:
      pool:
        spec:
          endpointPickerRef:
            group: ""
      template:
        containers:
          - name: main
            # Override scheduler image version
            image: ghcr.io/llm-d/llm-d-inference-scheduler:v0.5.0
            # Override args to enable secure serving
            args:
              - --pool-name
              - '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
              - --pool-namespace
              - '{{ .ObjectMeta.Namespace }}'
              - --zap-encoder
              - json
              - --grpc-port
              - "9002"
              - --grpc-health-port
              - "9003"
              - --kv-cache-usage-percentage-metric
              - "vllm:kv_cache_usage_perc"
              - --metrics-endpoint-auth=false
              - --secure-serving
              - --cert-path
              - /etc/ssl/certs
            # Override grpc service names and ports for probes
            livenessProbe:
              grpc:
                port: 9003
                service: envoy.service.ext_proc.v3.ExternalProcessor
            readinessProbe:
              grpc:
                port: 9003
                service: envoy.service.ext_proc.v3.ExternalProcessor
