---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ai-gateway
spec:
  # Envoy Gateway installs the "envoy" GatewayClass by default.
  # Change this only if your cluster uses a different GatewayClass.
  gatewayClassName: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
