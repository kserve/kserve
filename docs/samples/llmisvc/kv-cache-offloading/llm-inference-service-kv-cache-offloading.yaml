apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: qwen2-7b-kv-cache-offloading
spec:
  model:
    uri: hf://Qwen/Qwen2.5-7B-Instruct
    name: Qwen/Qwen2.5-7B-Instruct
  router:
    scheduler: {}
    route: {}
    gateway: {}
  template:
    containers:
      - name: main
        resources:
          limits:
            cpu: '8'
            memory: 64Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: '4'
            memory: 32Gi
            nvidia.com/gpu: "1"
  workload:
    kvCacheOffloading:
      # Primary tier: CPU RAM (GPU overflows here first)
      cpu: "10Gi"
      evictionPolicy: lru
      # Secondary tiers: disk (GPU -> CPU -> disk cascade)
      secondary:
      # Option A: node-local ephemeral disk, no StorageClass required
      - fileSystem:
          emptyDir:
            size: "100Gi"
      # Option B: controller-managed ephemeral PVC per pod (uncomment to use)
      # - fileSystem:
      #     pvc:
      #       accessModes: [ReadWriteOnce]
      #       storageClassName: fast-local-nvme
      #       resources:
      #         requests:
      #           storage: 100Gi
      # Option C: pre-existing RWX PVC shared across replicas (uncomment to use)
      # - fileSystem:
      #     ref:
      #       name: my-shared-kv-cache-pvc
      #       path: kv-cache/   # subdirectory within the PVC
