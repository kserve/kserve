apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: qwen2-7b-kv-offload-obj
spec:
  model:
    uri: hf://Qwen/Qwen2.5-7B-Instruct
    name: Qwen/Qwen2.5-7B-Instruct
  replicas: 1
  router:
    scheduler: { }
    route: { }
    gateway: { }
  # GPU -> CPU -> Object Store tiered offloading: KV cache blocks spill from GPU to CPU RAM,
  # then from CPU RAM to an S3-compatible object store. Useful for very large KV caches
  # that exceed local storage, or when cross-node sharing is needed.
  kvCacheOffloading:
    mode: obj
    cpu:
      size: 10Gi
      evictionPolicy: lru
      blockSize: 64
    objectStore:
      storeConfig:
        endpoint: "s3.example.com"
        bucket: "kv-cache"
        access_key: <REPLACE_WITH_YOUR_ACCESS_KEY>
        secret_key: <REPLACE_WITH_YOUR_SECRET_KEY>
      prefix: "kv/"
      ioThreads: 8
  template:
    containers:
      - name: main
        resources:
          limits:
            cpu: '4'
            memory: 32Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: '2'
            memory: 16Gi
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
