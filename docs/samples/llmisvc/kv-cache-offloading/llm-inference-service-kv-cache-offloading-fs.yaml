apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: qwen2-7b-kv-offload-fs
spec:
  model:
    uri: hf://Qwen/Qwen2.5-7B-Instruct
    name: Qwen/Qwen2.5-7B-Instruct
  replicas: 1
  router:
    scheduler: { }
    route: { }
    gateway: { }
  # GPU -> CPU -> Filesystem tiered offloading: KV cache blocks spill from GPU to CPU RAM,
  # then from CPU RAM to a filesystem path. Mount a shared PVC at the path for cross-pod
  # reuse, or use a local path for node-local storage only.
  kvCacheOffloading:
    mode: fs
    cpu:
      size: 10Gi
      evictionPolicy: lru
      blockSize: 64
    fileSystem:
      path: /mnt/kv-cache
      readThreads: 16
      writeThreads: 16
  template:
    containers:
      - name: main
        resources:
          limits:
            cpu: '4'
            memory: 32Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: '2'
            memory: 16Gi
            nvidia.com/gpu: "1"
        # Mount a PVC (or emptyDir/hostPath) at the filesystem tier path.
        volumeMounts:
          - name: kv-cache-storage
            mountPath: /mnt/kv-cache
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
    volumes:
      - name: kv-cache-storage
        persistentVolumeClaim:
          claimName: kv-cache-pvc
