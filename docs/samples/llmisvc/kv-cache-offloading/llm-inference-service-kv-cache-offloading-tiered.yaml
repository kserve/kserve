apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: qwen2-7b-kv-offload-tiered
spec:
  model:
    uri: hf://Qwen/Qwen2.5-7B-Instruct
    name: Qwen/Qwen2.5-7B-Instruct
  replicas: 1
  router:
    scheduler: { }
    route: { }
    gateway: { }
  # Multi-tier KV cache offloading: GPU -> CPU RAM -> filesystem secondary tiers.
  # vLLM's TieringManager internally manages eviction and promotion across tiers.
  kvCacheOffloading:
    cpu:
      size: 10Gi
      evictionPolicy: lru
      blockSize: 64
    fileSystem:
      # Fast node-local NVMe
      - path: /mnt/kv-cache-nvme
        readThreads: 16
        writeThreads: 16
      # Shared filesystem for cross-replica
      - path: /mnt/ceph-rwx
        readThreads: 8
        writeThreads: 8
  template:
    containers:
      - name: main
        resources:
          limits:
            cpu: '4'
            memory: 32Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: '2'
            memory: 16Gi
            nvidia.com/gpu: "1"
        volumeMounts:
          - name: local-nvme
            mountPath: /mnt/kv-cache-nvme
          - name: ceph-rwx
            mountPath: /mnt/ceph-rwx
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
    volumes:
      # Per-replica ephemeral storage on node disk.
      # For persistent node-local storage, replace with hostPath:
      #   hostPath:
      #     path: /data/kv-cache
      #     type: DirectoryOrCreate
      - name: local-nvme
        emptyDir:
          sizeLimit: 50Gi
      # Shared-filesystem PVC for cross-replica KV cache reuse.
      - name: ceph-rwx
        persistentVolumeClaim:
          claimName: kv-cache-pvc
