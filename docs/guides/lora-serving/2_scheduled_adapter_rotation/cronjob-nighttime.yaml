# Runs at 8 PM UTC on weekdays: loads the batch-processing adapter
# and unloads the interactive adapter to free GPU memory for throughput.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: lora-rotate-nighttime
spec:
  schedule: "0 20 * * 1-5"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          serviceAccountName: lora-manager
          restartPolicy: Never
          containers:
          - name: rotator
            image: REPLACE_ME_LORA_MANAGER_IMAGE
            args: ["swap"]
            env:
              - name: LLMISVC_NAME
                value: "qwen2-lora"
              - name: UNLOAD_ADAPTER
                value: "interactive-lora"
              - name: LOAD_ADAPTER
                value: "batch-processing-lora"
              - name: LOAD_ADAPTER_SOURCE
                value: "REPLACE_ME_HF_REPO/batch-processing-lora"
