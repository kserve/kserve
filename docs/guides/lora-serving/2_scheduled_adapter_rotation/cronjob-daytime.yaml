# Runs at 8 AM UTC on weekdays: loads the interactive/low-latency adapter
# and unloads the batch-processing adapter.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: lora-rotate-daytime
spec:
  schedule: "0 8 * * 1-5"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          serviceAccountName: lora-manager
          restartPolicy: Never
          containers:
          - name: rotator
            image: REPLACE_ME_LORA_MANAGER_IMAGE
            args: ["swap"]
            env:
              - name: LLMISVC_NAME
                value: "qwen2-lora"
              - name: UNLOAD_ADAPTER
                value: "batch-processing-lora"
              - name: LOAD_ADAPTER
                value: "interactive-lora"
              - name: LOAD_ADAPTER_SOURCE
                value: "REPLACE_ME_HF_REPO/interactive-lora"
