# One-shot Job to swap LoRA adapters on all vLLM replicas.
# Run this manually to test or trigger an immediate rotation:
#
#   kubectl apply -f lora-swap-job.yaml
#   kubectl logs -f job/lora-swap
#
# Edit UNLOAD_ADAPTER and LOAD_ADAPTER / LOAD_ADAPTER_SOURCE below
# to swap between any two adapters.
apiVersion: batch/v1
kind: Job
metadata:
  name: lora-swap
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: lora-manager
      restartPolicy: Never
      containers:
      - name: swapper
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        env:
          - name: UNLOAD_ADAPTER
            value: "batch-processing-lora"
          - name: LOAD_ADAPTER
            value: "interactive-lora"
          - name: LOAD_ADAPTER_SOURCE
            value: "REPLACE_ME_HF_REPO/interactive-lora"
          - name: LLMISVC_NAME
            value: "qwen2-lora"
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -euo pipefail

          LABEL_SELECTOR="app.kubernetes.io/part-of=llminferenceservice,app.kubernetes.io/name=${LLMISVC_NAME}"
          PORT=8000

          APISERVER="https://kubernetes.default.svc"
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
          CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

          echo "Discovering vLLM pods for ${LLMISVC_NAME}..."

          PODS_JSON=$(curl -s --cacert ${CACERT} \
            -H "Authorization: Bearer ${TOKEN}" \
            "${APISERVER}/api/v1/namespaces/${NAMESPACE}/pods?labelSelector=${LABEL_SELECTOR}")

          POD_IPS=$(echo "${PODS_JSON}" | grep -o '"podIP":"[^"]*"' | cut -d'"' -f4)

          if [ -z "${POD_IPS}" ]; then
            echo "ERROR: No pods found for ${LLMISVC_NAME}"
            exit 1
          fi

          FAILED=0
          for IP in ${POD_IPS}; do
            echo "=== Pod ${IP} ==="

            # Step 1: Unload the old adapter (ignore errors if not loaded)
            if [ -n "${UNLOAD_ADAPTER}" ]; then
              echo "  Unloading '${UNLOAD_ADAPTER}'..."
              curl -s -k -X POST "https://${IP}:${PORT}/v1/unload_lora_adapter" \
                -H "Content-Type: application/json" \
                -d "{\"lora_name\": \"${UNLOAD_ADAPTER}\"}" || true
            fi

            # Step 2: Load the new adapter
            echo "  Loading '${LOAD_ADAPTER}'..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -k \
              -X POST "https://${IP}:${PORT}/v1/load_lora_adapter" \
              -H "Content-Type: application/json" \
              -d "{
                \"lora_name\": \"${LOAD_ADAPTER}\",
                \"lora_path\": \"${LOAD_ADAPTER_SOURCE}\"
              }")

            if [ "${HTTP_CODE}" -eq 200 ]; then
              echo "  OK"
            else
              echo "  FAILED to load ${LOAD_ADAPTER} (HTTP ${HTTP_CODE})"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ ${FAILED} -gt 0 ]; then
            echo "ERROR: ${FAILED} pod(s) failed"
            exit 1
          fi

          echo "Swap complete: '${UNLOAD_ADAPTER}' unloaded, '${LOAD_ADAPTER}' loaded on all replicas."
