apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lora-management-internal-only
spec:
  # Apply to vLLM serving pods
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: llminferenceservice
  policyTypes:
  - Ingress
  ingress:
  # Allow all traffic from within the cluster to the vLLM pods.
  # The Gateway/HTTPRoute controls what external clients can reach --
  # since /v1/load_lora_adapter and /v1/unload_lora_adapter are not
  # exposed via the HTTPRoute, external clients cannot call them.
  #
  # In-cluster workloads (Jobs, CronJobs, other pods) with appropriate
  # RBAC can still reach the vLLM pods directly via the Service to
  # manage LoRA adapters.
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8000
