apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: qwen2-lora
spec:
  model:
    name: Qwen/Qwen2.5-7B-Instruct
    uri: hf://Qwen/Qwen2.5-7B-Instruct
    # No static lora.adapters -- adapters are loaded and unloaded
    # dynamically via the vLLM LoRA management API at runtime.
  replicas: 2
  router:
    gateway: {}
    route: {}
    scheduler: {}
  template:
    tolerations:
    - key: "nvidia.com/gpu"
      operator: "Equal"
      value: "present"
      effect: "NoSchedule"
    containers:
    - name: main
      env:
        # Enable LoRA support in vLLM without pre-loading any adapters.
        # Adapters will be loaded dynamically via POST /v1/load_lora_adapter.
        - name: VLLM_ADDITIONAL_ARGS
          value: "--enable-lora --max-lora-rank=64 --max-loras=4 --max-cpu-loras=4"
        - name: HF_HUB_OFFLINE
          value: "false"
      resources:
        limits:
          cpu: "4"
          memory: 32Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "2"
          memory: 16Gi
          nvidia.com/gpu: "1"
      livenessProbe:
        httpGet:
          path: /health
          port: 8000
          scheme: HTTPS
        initialDelaySeconds: 120
        periodSeconds: 30
        timeoutSeconds: 30
        failureThreshold: 5
