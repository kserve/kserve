apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qwen2-lora-dynamic-route
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: openshift-ai-inference
    namespace: openshift-ingress
  rules:
  - backendRefs:
    - group: inference.networking.x-k8s.io
      kind: InferencePool
      name: qwen2-lora-dynamic-inference-pool
      port: 8000
      weight: 1
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          replacePrefixMatch: /v1/completions
          type: ReplacePrefixMatch
    matches:
    - path:
        type: PathPrefix
        value: /greg/qwen2-lora/v1/completions
    timeouts:
      backendRequest: 0s
      request: 0s
  - backendRefs:
    - group: inference.networking.x-k8s.io
      kind: InferencePool
      name: qwen2-lora-dynamic-inference-pool
      port: 8000
      weight: 1
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          replacePrefixMatch: /v1/chat/completions
          type: ReplacePrefixMatch
    matches:
    - path:
        type: PathPrefix
        value: /greg/qwen2-lora/v1/chat/completions
    timeouts:
      backendRequest: 0s
      request: 0s
  - backendRefs:
    - group: inference.networking.x-k8s.io
      kind: InferencePool
      name: qwen2-lora-dynamic-inference-pool
      port: 8000
      weight: 1
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          replacePrefixMatch: /v1/responses
          type: ReplacePrefixMatch
    matches:
    - path:
        type: PathPrefix
        value: /greg/qwen2-lora/v1/responses
    timeouts:
      backendRequest: 0s
      request: 0s
  - backendRefs:
    - group: ""
      kind: Service
      name: qwen2-lora-dynamic-kserve-workload-svc
      port: 8000
      weight: 1
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          replacePrefixMatch: /v1/models
          type: ReplacePrefixMatch
    matches:
    - path:
        type: PathPrefix
        value: /greg/qwen2-lora/v1/models
    timeouts:
      backendRequest: 0s
      request: 0s
