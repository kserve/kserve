# ServiceAccount for workloads that manage LoRA adapters (load/unload).
# This gives cluster operators a clear audit trail of which identity is
# making adapter changes, and can be further restricted with additional
# RBAC policies as needed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lora-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lora-manager
rules:
# Allow reading pods to resolve pod IPs for direct adapter management
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lora-manager
subjects:
- kind: ServiceAccount
  name: lora-manager
roleRef:
  kind: Role
  name: lora-manager
  apiGroup: rbac.authorization.k8s.io
