# Team A loads their adapter from their own namespace.
# The Job runs in lora-team-a but reaches the shared model server
# in lora-serving via the cross-namespace RoleBinding.
apiVersion: batch/v1
kind: Job
metadata:
  name: load-team-a-adapter
  namespace: lora-team-a
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: lora-manager
      restartPolicy: Never
      containers:
      - name: loader
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -euo pipefail

          # Team A's adapter -- name is prefixed with team-a- by convention
          ADAPTER_NAME="team-a-finance-lora"
          ADAPTER_SOURCE="Max1690/qwen2.5-7b-finance-lora"
          LLMISVC_NAME="qwen2-lora"
          MODEL_NAMESPACE="lora-serving"
          LABEL_SELECTOR="app.kubernetes.io/part-of=llminferenceservice,app.kubernetes.io/name=${LLMISVC_NAME}"
          PORT=8000

          echo "Team A: Loading adapter '${ADAPTER_NAME}'..."

          APISERVER="https://kubernetes.default.svc"
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

          PODS_JSON=$(curl -s --cacert ${CACERT} \
            -H "Authorization: Bearer ${TOKEN}" \
            "${APISERVER}/api/v1/namespaces/${MODEL_NAMESPACE}/pods?labelSelector=${LABEL_SELECTOR}")

          POD_IPS=$(echo "${PODS_JSON}" | grep -o '"podIP":"[^"]*"' | cut -d'"' -f4)

          if [ -z "${POD_IPS}" ]; then
            echo "ERROR: No pods found for ${LLMISVC_NAME} in ${MODEL_NAMESPACE}"
            exit 1
          fi

          FAILED=0
          for IP in ${POD_IPS}; do
            echo "Loading on pod ${IP}..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -k \
              -X POST "https://${IP}:${PORT}/v1/load_lora_adapter" \
              -H "Content-Type: application/json" \
              -d "{
                \"lora_name\": \"${ADAPTER_NAME}\",
                \"lora_path\": \"${ADAPTER_SOURCE}\"
              }")

            if [ "${HTTP_CODE}" -eq 200 ]; then
              echo "  OK (${HTTP_CODE})"
            else
              echo "  FAILED (${HTTP_CODE})"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ ${FAILED} -gt 0 ]; then
            echo "ERROR: ${FAILED} pod(s) failed"
            exit 1
          fi

          echo "Team A adapter '${ADAPTER_NAME}' loaded successfully."
