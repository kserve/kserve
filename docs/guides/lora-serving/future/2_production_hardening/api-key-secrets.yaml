# API Key Secrets for authenticated access to LoRA inference endpoints
#
# Each secret represents one API consumer. The labels must match the
# AuthPolicy's apiKey selector. Annotations carry identity metadata
# that the AuthPolicy extracts into auth.identity for use in
# RateLimitPolicy predicates and counters.
#
# Fields:
#   secret.kuadrant.io/user-id  — unique user identifier
#   secret.kuadrant.io/tier     — rate-limit tier (e.g., "premium", "standard")
#
---
apiVersion: v1
kind: Secret
metadata:
  name: api-key-team-ml
  labels:
    authorino.kuadrant.io/managed-by: authorino
    app: lora-serving
  annotations:
    secret.kuadrant.io/user-id: team-ml
    secret.kuadrant.io/tier: premium
stringData:
  api_key: REPLACE_ME_TEAM_ML_KEY
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: api-key-team-finance
  labels:
    authorino.kuadrant.io/managed-by: authorino
    app: lora-serving
  annotations:
    secret.kuadrant.io/user-id: team-finance
    secret.kuadrant.io/tier: premium
stringData:
  api_key: REPLACE_ME_TEAM_FINANCE_KEY
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: api-key-dev-sandbox
  labels:
    authorino.kuadrant.io/managed-by: authorino
    app: lora-serving
  annotations:
    secret.kuadrant.io/user-id: dev-sandbox
    secret.kuadrant.io/tier: standard
stringData:
  api_key: REPLACE_ME_DEV_SANDBOX_KEY
type: Opaque
