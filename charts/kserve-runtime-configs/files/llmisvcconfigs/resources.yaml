          name: main
        - env:
          - name: LATENCY_RETRAINING_INTERVAL_SEC
            value: "10"
          - name: LATENCY_MIN_SAMPLES_FOR_RETRAIN
            value: "100"
          - name: LATENCY_TTFT_MODEL_PATH
