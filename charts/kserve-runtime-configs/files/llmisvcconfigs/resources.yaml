        - name: HF_HUB_CACHE
          value: /models
        image: ghcr.io/llm-d/llm-d-cuda:v0.7.0
        imagePullPolicy: IfNotPresent
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sleep
              - "15"
        livenessProbe:
          failureThreshold: 10
          httpGet:
            path: /health
            port: 8000
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          periodSeconds: 10
          timeoutSeconds: 1
        name: main
        ports:
        - containerPort: 8000
          protocol: TCP
        readinessProbe:
          failureThreshold: 2
          httpGet:
            path: /health
            port: 8000
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          periodSeconds: 1
          timeoutSeconds: 1
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - IPC_LOCK
            - SYS_RAWIO
            - NET_RAW
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        startupProbe:
          failureThreshold: 60
          httpGet:
            path: /health
            port: 8000
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          periodSeconds: 10
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - mountPath: /home
          name: home
        - mountPath: /tmp
          name: tmp-dir
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /models
          name: model-cache
        - mountPath: /var/run/kserve/tls
          name: tls-certs
          readOnly: true
      terminationGracePeriodSeconds: 60
      volumes:
      - emptyDir: {}
        name: home
      - emptyDir: {}
        name: tmp-dir
      - emptyDir:
          medium: Memory
          sizeLimit: 8Gi
        name: dshm
      - emptyDir: {}
        name: model-cache
      - name: tls-certs
        secret:
          secretName: '{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}'
    worker:
      containers:
      - command:
        - /bin/bash
        - -c
        - |-
          {{ dpAddressResolveScript }}

          {{ rdmaDetectScript }}

          START_RANK=$(( ${LWS_WORKER_INDEX:-0} * {{ or .Spec.Prefill.Parallelism.DataLocal 1 }} ))

          {{ vllmVersionScript }}

          {{ vllmAccessLogDetectScript }}

          {{ if .Spec.Prefill }}{{ shutdownTimeoutScript .Spec.Prefill.Worker 15 }}{{ else }}{{ shutdownTimeoutScript nil 15 }}{{ end }}

          # --kv-transfer-config with OffloadingConnector requires vLLM 0.22.0+ (vllm-project/vllm#40020).
          KV_TRANSFER_ARGS=""
          if [[ "$VLLM_VERSION" =~ ^[0-9]+\.[0-9]+ ]] && [ "$(printf '%s\n%s\n' "0.22.0" "${VLLM_VERSION}" | sort -V | head -1)" = "0.22.0" ]; then
            if [[ "${VLLM_ADDITIONAL_ARGS:-}" != *"--kv-transfer-config"* ]] && [[ "${VLLM_ADDITIONAL_ARGS:-}" != *"--kv_transfer_config"* ]] && [[ "$*" != *"--kv-transfer-config"* ]] && [[ "$*" != *"--kv_transfer_config"* ]]; then
              KV_TRANSFER_ARGS="{{ if .Spec.Prefill }}{{ kvTransferConfig .Spec.Prefill.KVCacheOffloading }}{{ end }}"
            fi
          fi

          eval "exec vllm serve \
            /mnt/models \
            --served-model-name "{{ .Spec.Model.Name }}" "publishers/{{ .ObjectMeta.Namespace }}/models/{{ .Spec.Model.Name }}" \
            --port 8000 \
            {{- if .Spec.Prefill.Parallelism.Expert }}--enable-expert-parallel{{- end }} \
            {{- if .Spec.Prefill.Parallelism.Tensor }}--tensor-parallel-size {{ .Spec.Prefill.Parallelism.Tensor }}{{- end }} \
            --data-parallel-size {{ or .Spec.Prefill.Parallelism.Data 1 }} \
            --data-parallel-size-local {{ or .Spec.Prefill.Parallelism.DataLocal 1 }} \
            --data-parallel-address ${DP_ADDRESS} \
            --data-parallel-rpc-port {{ if .Spec.Prefill.Parallelism.DataRPCPort }}{{ .Spec.Prefill.Parallelism.DataRPCPort }}{{ else }}5555{{- end }} \
            --data-parallel-start-rank $START_RANK \
            --headless \
            ${ACCESS_LOG_ARGS} \
            ${SHUTDOWN_TIMEOUT_ARGS} \
            ${KV_TRANSFER_ARGS} \
            {{ if .GlobalConfig.EnableTLS }}--enable-ssl-refresh{{- end }} \
            {{ if .GlobalConfig.EnableTLS }}--ssl-certfile /var/run/kserve/tls/tls.crt{{- end }} \
            {{ if .GlobalConfig.EnableTLS }}--ssl-keyfile /var/run/kserve/tls/tls.key{{- end }} \
            ${VLLM_ADDITIONAL_ARGS} \
            $@"
        - --
        env:
        - name: HOME
          value: /home
        - name: VLLM_LOGGING_LEVEL
          value: INFO
        - name: HF_HUB_CACHE
          value: /models
        image: ghcr.io/llm-d/llm-d-cuda:v0.7.0
        imagePullPolicy: IfNotPresent
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sleep
              - "15"
        name: main
        ports:
        - containerPort: 8000
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - IPC_LOCK
            - SYS_RAWIO
            - NET_RAW
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - mountPath: /home
          name: home
        - mountPath: /tmp
          name: tmp-dir
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /models
          name: model-cache
        - mountPath: /var/run/kserve/tls
          name: tls-certs
          readOnly: true
      terminationGracePeriodSeconds: 60
      volumes:
      - emptyDir: {}
        name: home
      - emptyDir: {}
        name: tmp-dir
      - emptyDir:
          medium: Memory
          sizeLimit: 8Gi
        name: dshm
      - emptyDir: {}
        name: model-cache
      - name: tls-certs
        secret:
          secretName: '{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}'
---
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: kserve-config-llm-router-route
  namespace: kserve
spec:
  router:
    route:
      http:
        spec:
          parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: '{{ .GlobalConfig.IngressGatewayName }}'
            namespace: '{{ .GlobalConfig.IngressGatewayNamespace }}'
          rules:
          - backendRefs:
            - group: inference.networking.k8s.io
              kind: InferencePool
              name: '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
              port: 8000
              weight: 1
            filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  replacePrefixMatch: /v1/completions
                  type: ReplacePrefixMatch
            matches:
            - path:
                type: PathPrefix
                value: /{{ .ObjectMeta.Namespace }}/{{ .ObjectMeta.Name }}/v1/completions
            name: v1-completions-path
            timeouts:
              backendRequest: 0s
              request: 0s
          - backendRefs:
            - group: inference.networking.k8s.io
              kind: InferencePool
              name: '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
              port: 8000
              weight: 1
            matches:
            - headers:
              - name: '{{ .GlobalConfig.ModelBasedRoutingHeaderName }}'
                type: Exact
                value: publishers/{{ .ObjectMeta.Namespace }}/models/{{ .Spec.Model.Name
                  }}
              path:
                type: Exact
                value: /v1/completions
            - headers:
              - name: '{{ .GlobalConfig.ModelBasedRoutingHeaderName }}'
                type: Exact
                value: publishers/{{ .ObjectMeta.Namespace }}/models/{{ .Spec.Model.Name
                  }}
              path:
                type: Exact
                value: /v1/completions/
            name: v1-completions-model-routing
            timeouts:
              backendRequest: 0s
              request: 0s
          - backendRefs:
            - group: inference.networking.k8s.io
              kind: InferencePool
              name: '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
              port: 8000
              weight: 1
            filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  replacePrefixMatch: /v1/chat/completions
                  type: ReplacePrefixMatch
            matches:
            - path:
                type: PathPrefix
                value: /{{ .ObjectMeta.Namespace }}/{{ .ObjectMeta.Name }}/v1/chat/completions
            name: v1-chat-completions-path
            timeouts:
              backendRequest: 0s
              request: 0s
          - backendRefs:
            - group: inference.networking.k8s.io
              kind: InferencePool
              name: '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
              port: 8000
              weight: 1
            matches:
            - headers:
              - name: '{{ .GlobalConfig.ModelBasedRoutingHeaderName }}'
                type: Exact
                value: publishers/{{ .ObjectMeta.Namespace }}/models/{{ .Spec.Model.Name
                  }}
              path:
                type: Exact
