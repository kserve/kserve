      env:
      - name: HOME
        value: /home
      - name: VLLM_LOGGING_LEVEL
        value: INFO
      - name: HF_HUB_CACHE
        value: /models
      - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
        value: "1"
      image: ghcr.io/llm-d/llm-d-cuda:v0.7.0
      imagePullPolicy: IfNotPresent
      lifecycle:
        preStop:
          exec:
            command:
            - /bin/sleep
