            failureThreshold: 30
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 10
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
          - mountPath: /models
            name: training-server-storage
          - mountPath: /tmp
            name: training-server-tmp
        - env:
          - name: TRAINING_SERVER_URL
            value: http://localhost:8000
          - name: LATENCY_MODEL_TYPE
            value: xgboost
          - name: PREDICT_HOST
            value: 0.0.0.0
          - name: PREDICT_PORT
            value: "8001"
          - name: LOCAL_TTFT_MODEL_PATH
            value: /server_models/ttft.joblib
          - name: LOCAL_TPOT_MODEL_PATH
            value: /server_models/tpot.joblib
          - name: LOCAL_TTFT_SCALER_PATH
            value: /server_models/ttft_scaler.joblib
          - name: LOCAL_TPOT_SCALER_PATH
            value: /server_models/tpot_scaler.joblib
          - name: LOCAL_TTFT_GATED_MODEL_PATH
            value: /server_models/ttft_gated.joblib
          - name: LOCAL_TPOT_GATED_MODEL_PATH
            value: /server_models/tpot_gated.joblib
          - name: UVICORN_WORKERS
            value: "28"
          - name: OMP_NUM_THREADS
            value: "1"
          - name: MODEL_SYNC_INTERVAL_SEC
            value: "30"
          - name: LATENCY_OBJECTIVE_TYPE
            value: mean
          image: ghcr.io/llm-d/llm-d-latency-predictor-prediction-server:v0.8.0
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          name: prediction-server
          ports:
          - containerPort: 8001
            name: predict-port
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 28000m
              memory: 8Gi
            requests:
              cpu: 8000m
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /readyz
              port: 8001
            periodSeconds: 10
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
          - mountPath: /server_models
            name: prediction-server-storage
          - mountPath: /tmp
            name: prediction-server-tmp
        restartPolicy: Always
        terminationGracePeriodSeconds: 60
        volumes:
        - emptyDir:
            sizeLimit: 20Gi
          name: training-server-storage
        - emptyDir:
            sizeLimit: 10Gi
          name: prediction-server-storage
        - emptyDir: {}
          name: training-server-tmp
        - emptyDir: {}
          name: prediction-server-tmp
