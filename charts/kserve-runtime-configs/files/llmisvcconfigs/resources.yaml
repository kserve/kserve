                value: publishers/{{ .ObjectMeta.Namespace }}/models/{{ .Spec.Model.Name
                  }}
              path:
                type: Exact
                value: /v1/chat/completions/
            name: v1-chat-completions-model-routing
            timeouts:
              backendRequest: 0s
              request: 0s
          - backendRefs:
            - group: inference.networking.k8s.io
              kind: InferencePool
              name: '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
              port: 8000
              weight: 1
            filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  replacePrefixMatch: /v1/responses
                  type: ReplacePrefixMatch
            matches:
            - path:
                type: PathPrefix
                value: /{{ .ObjectMeta.Namespace }}/{{ .ObjectMeta.Name }}/v1/responses
            name: v1-responses-path
            timeouts:
              backendRequest: 0s
              request: 0s
          - backendRefs:
            - group: inference.networking.k8s.io
              kind: InferencePool
              name: '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
              port: 8000
              weight: 1
            matches:
            - headers:
              - name: '{{ .GlobalConfig.ModelBasedRoutingHeaderName }}'
                type: Exact
                value: publishers/{{ .ObjectMeta.Namespace }}/models/{{ .Spec.Model.Name
                  }}
              path:
                type: Exact
                value: /v1/responses
            - headers:
              - name: '{{ .GlobalConfig.ModelBasedRoutingHeaderName }}'
                type: Exact
                value: publishers/{{ .ObjectMeta.Namespace }}/models/{{ .Spec.Model.Name
                  }}
              path:
                type: Exact
                value: /v1/responses/
            name: v1-responses-model-routing
            timeouts:
              backendRequest: 0s
              request: 0s
          - backendRefs:
            - group: inference.networking.k8s.io
              kind: InferencePool
              name: '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
              port: 8000
              weight: 1
            filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  replacePrefixMatch: /v1/messages
                  type: ReplacePrefixMatch
            matches:
            - path:
                type: PathPrefix
                value: /{{ .ObjectMeta.Namespace }}/{{ .ObjectMeta.Name }}/v1/messages
            name: v1-messages-path
            timeouts:
              backendRequest: 0s
              request: 0s
          - backendRefs:
            - group: inference.networking.k8s.io
              kind: InferencePool
              name: '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
              port: 8000
              weight: 1
            matches:
            - headers:
              - name: '{{ .GlobalConfig.ModelBasedRoutingHeaderName }}'
                type: Exact
                value: publishers/{{ .ObjectMeta.Namespace }}/models/{{ .Spec.Model.Name
                  }}
              path:
                type: Exact
                value: /v1/messages
            - headers:
              - name: '{{ .GlobalConfig.ModelBasedRoutingHeaderName }}'
                type: Exact
                value: publishers/{{ .ObjectMeta.Namespace }}/models/{{ .Spec.Model.Name
                  }}
              path:
                type: Exact
                value: /v1/messages/
            name: v1-messages-model-routing
            timeouts:
              backendRequest: 0s
              request: 0s
          - backendRefs:
            - kind: Service
              name: '{{ ChildName .ObjectMeta.Name `-kserve-workload-svc` }}'
              port: 8000
              weight: 1
            filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  replacePrefixMatch: /
