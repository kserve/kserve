apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: kserve-config-llm-scheduler
  namespace: kserve
spec:
  router:
    scheduler:
      annotations:
        app.kubernetes.io/version: 0.9.0
      pool:
        spec:
          endpointPickerRef:
            failureMode: FailOpen
            kind: Service
            name: '{{ ChildName .ObjectMeta.Name `-epp-service` }}'
            port:
              number: 9002
          selector:
            matchLabels:
              app.kubernetes.io/name: '{{ .ObjectMeta.Name }}'
              app.kubernetes.io/part-of: llminferenceservice
              kserve.io/component: workload
          targetPorts:
          - number: 8000
      template:
        containers:
        - command:
          - /app/epp
          - --pool-name
          - '{{ ChildName .ObjectMeta.Name `-inference-pool` }}'
          - --pool-namespace
          - '{{ .ObjectMeta.Namespace }}'
          - --zap-encoder
          - json
          - --grpc-port
          - "9002"
          - --grpc-health-port
          - "9003"
          - '{{ if .GlobalConfig.EnableTLS }}--enable-cert-reload=true{{- end }}'
          - '{{ if .GlobalConfig.EnableTLS }}--secure-serving=true{{- end }}'
          - '{{ if .GlobalConfig.EnableTLS }}--model-server-metrics-scheme=https{{-
            end }}'
          - '{{ if .GlobalConfig.EnableTLS }}--cert-path=/var/run/kserve/tls{{- end
            }}'
          env:
          - name: SSL_CERT_DIR
            value: /var/run/kserve/tls:/var/run/secrets/kubernetes.io/serviceaccount:/etc/pki/tls/certs
          image: ghcr.io/llm-d/llm-d-router-endpoint-picker:v0.9.0-rc.2
          imagePullPolicy: IfNotPresent
          lifecycle:
            preStop:
              exec:
                command:
                - /bin/sleep
                - "15"
          livenessProbe:
            failureThreshold: 3
            grpc:
              port: 9003
              service: liveness
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          name: main
          ports:
          - containerPort: 9002
            name: grpc
            protocol: TCP
          - containerPort: 9003
            name: grpc-health
            protocol: TCP
          - containerPort: 9090
            name: metrics
            protocol: TCP
          - containerPort: 5557
            name: zmq
            protocol: TCP
          readinessProbe:
            failureThreshold: 3
            grpc:
              port: 9003
              service: readiness
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            limits:
              cpu: 6
              memory: 16Gi
            requests:
              cpu: 1
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
          - mountPath: /var/run/kserve/tls
            name: tls-certs
            readOnly: true
          - mountPath: /tmp/tokenizer
            name: tokenizer-uds
        - env:
          - name: TOKENIZERS_DIR
            value: /mnt/models
          image: ghcr.io/llm-d/llm-d-uds-tokenizer:vllm-v0.19.1
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8082
            periodSeconds: 15
            timeoutSeconds: 5
          name: tokenizer
          ports:
          - containerPort: 8082
            name: health
            protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8082
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 256m
              memory: 500Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
          - mountPath: /tmp
            name: tokenizer-tmp
          - mountPath: /.cache
            name: tokenizer-cache
          - mountPath: /tmp/tokenizer
            name: tokenizer-uds
          workingDir: /mnt/models
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        terminationGracePeriodSeconds: 60
        volumes:
        - name: tls-certs
          secret:
            secretName: '{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs`
              }}'
        - emptyDir: {}
          name: tokenizer-uds
        - emptyDir: {}
          name: tokenizer-tmp
        - emptyDir: {}
          name: tokenizer-cache
---
apiVersion: serving.kserve.io/v1alpha2
