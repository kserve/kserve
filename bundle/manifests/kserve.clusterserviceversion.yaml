  description: |-
    ## KServe: Scalable Model Inference on Kubernetes

    KServe is a highly scalable and standards-based model inference platform
    on Kubernetes for trusted AI. It provides performant, standardized
    inference protocol across ML frameworks including PyTorch, TensorFlow,
    XGBoost, scikit-learn, and supports modern generative AI use cases such
    as LLM serving with Hugging Face and vLLM.

    ### Key Features

    * **Serverless inference** - Autoscaling including scale-to-zero on GPU.
    * **High scalability and density** - ModelMesh for high-scale,
      high-density, and frequently-changing model serving use cases.
    * **Inference graphs** - Multi-model serving, model ensembles, and
      inference pipelines for complex AI workflows.
    * **LLM serving** - First-class support for large language model
      deployment with optimized batching and GPU scheduling.
    * **Pluggable runtimes** - Support for custom model serving runtimes
      and framework-specific optimizations.
    * **Standard inference protocol** - Open Inference Protocol for
      interoperability across ML/DL frameworks.

    ### Getting Started

    After installing the operator, create an `InferenceService` resource to
    deploy your first model. See the
    [KServe documentation](https://kserve.github.io/website/) for guides
    and examples.
