      deployments:
        - label:
            app.kubernetes.io/component: kserve
            app.kubernetes.io/name: kserve
            control-plane: kserve-controller-manager
            controller-tools.k8s.io: "1.0"
          name: kserve-controller-manager
          spec:
            selector:
              matchLabels:
                control-plane: kserve-controller-manager
                controller-tools.k8s.io: "1.0"
            strategy: {}
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/default-container: manager
                labels:
                  app.kubernetes.io/name: kserve-controller-manager
                  control-plane: kserve-controller-manager
                  controller-tools.k8s.io: "1.0"
              spec:
                containers:
                  - args:
                      - --metrics-addr=127.0.0.1:8080
                      - --leader-elect
                    command:
                      - /manager
                    env:
                      - name: POD_NAMESPACE
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                      - name: SECRET_NAME
                        value: kserve-webhook-server-cert
                    image: kserve/kserve-controller:v0.17.0
                    imagePullPolicy: Always
                    livenessProbe:
                      failureThreshold: 5
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 30
                      timeoutSeconds: 5
                    name: manager
                    ports:
                      - containerPort: 9443
                        name: webhook-server
                        protocol: TCP
                    readinessProbe:
                      failureThreshold: 5
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 30
                      periodSeconds: 5
                      timeoutSeconds: 5
                    resources:
                      limits:
                        cpu: 100m
                        memory: 300Mi
                      requests:
                        cpu: 100m
                        memory: 200Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      privileged: false
                      readOnlyRootFilesystem: true
                      runAsNonRoot: true
                    volumeMounts:
                      - mountPath: /tmp/k8s-webhook-server/serving-certs
                        name: cert
                        readOnly: true
                  - args:
                      - --secure-listen-address=0.0.0.0:8443
                      - --upstream=http://127.0.0.1:8080/
                      - --logtostderr=true
                      - --v=10
                    image: quay.io/brancz/kube-rbac-proxy:v0.18.0
                    name: kube-rbac-proxy
                    ports:
                      - containerPort: 8443
                        name: https
                        protocol: TCP
                    resources:
                      limits:
                        cpu: 20m
                        memory: 64Mi
                      requests:
                        cpu: 5m
                        memory: 20Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      privileged: false
                      readOnlyRootFilesystem: true
                      runAsNonRoot: true
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                serviceAccountName: kserve-controller-manager
                terminationGracePeriodSeconds: 10
                volumes:
                  - name: cert
                    secret:
                      defaultMode: 420
                      secretName: kserve-webhook-server-cert
