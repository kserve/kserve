rver-type\": \"tritonserver\"\n      }\n    },\n    \"spec\": {\n      \"annotations\": {\n        \"prometheus.kserve.io/port\": \"8002\",\n        \"prometheus.kserve.io/path\": \"/metrics\"\n      },\n      \"supportedModelFormats\": [\n        {\n          \"name\": \"tensorrt\",\n          \"version\": \"8\",\n          \"autoSelect\": true,\n          \"priority\": 1\n        },\n        {\n          \"name\": \"tensorflow\",\n          \"version\": \"1\",\n          \"autoSelect\": true,\n          \"priority\": 1\n        },\n        {\n          \"name\": \"tensorflow\",\n          \"version\": \"2\",\n          \"autoSelect\": true,\n          \"priority\": 1\n        },\n        {\n          \"name\": \"onnx\",\n          \"version\": \"1\",\n          \"autoSelect\": true,\n          \"priority\": 1\n        },\n        {\n          \"name\": \"pytorch\",\n          \"version\": \"1\"\n        },\n        {\n          \"name\": \"triton\",\n          \"version\": \"2\",\n          \"autoSelect\": true,\n          \"priority\": 1\n        }\n      ],\n      \"protocolVersions\": [\n        \"v2\",\n        \"grpc-v2\"\n      ],\n      \"containers\": [\n        {\n          \"name\": \"kserve-container\",\n          \"image\": \"kserve-tritonserver:replace\",\n          \"args\": [\n            \"tritonserver\",\n            \"--model-store=/mnt/models\",\n            \"--grpc-port=9000\",\n            \"--http-port=8080\",\n            \"--allow-grpc=true\",\n            \"--allow-http=true\"\n          ],\n          \"securityContext\": {\n            \"runAsUser\": 1000,\n            \"allowPrivilegeEscalation\": false,\n            \"privileged\": false,\n            \"runAsNonRoot\": true,\n            \"capabilities\": {\n              \"drop\": [\n                \"ALL\"\n              ]\n            }\n          },\n          \"resources\": {\n            \"requests\": {\n              \"cpu\": \"1\",\n              \"memory\": \"2Gi\"\n            },\n            \"limits\": {\n              \"cpu\": \"1\",\n              \"memory\": \"2Gi\"\n            }\n          }\n        }\n      ]\n    }\n  },\n  {\n    \"apiVersion\": \"serving.kserve.io/v1alpha1\",\n    \"kind\": \"ClusterServingRuntime\",\n    \"metadata\": {\n      \"name\": \"kserve-xgbserver\",\n      \"annotations\": {\n        \"serving.kserve.io/server-type\": \"xgbserver\"\n      }\n    },\n    \"spec\": {\n      \"annotations\": {\n        \"prometheus.kserve.io/port\": \"8080\",\n        \"prometheus.kserve.io/path\": \"/metrics\"\n      },\n      \"supportedModelFormats\": [\n        {\n          \"name\": \"xgboost\",\n          \"version\": \"2\",\n          \"autoSelect\": true,\n          \"priority\": 1\n        }\n      ],\n      \"protocolVersions\": [\n        \"v1\",\n        \"v2\"\n      ],\n      \"containers\": [\n        {\n          \"name\": \"kserve-container\",\n          \"image\": \"kserve-xgbserver:replace\",\n          \"args\": [\n            \"--model_name={{.Name}}\",\n            \"--model_dir=/mnt/models\",\n            \"--http_port=8080\",\n            \"--nthread=1\"\n          ],\n          \"securityContext\": {\n            \"allowPrivilegeEscalation\": false,\n            \"privileged\": false,\n            \"runAsNonRoot\": true,\n            \"capabilities\": {\n              \"drop\": [\n                \"ALL\"\n              ]\n            }\n          },\n          \"resources\": {\n            \"requests\": {\n              \"cpu\": \"1\",\n              \"memory\": \"2Gi\"\n            },\n            \"limits\": {\n              \"cpu\": \"1\",\n              \"memory\": \"2Gi\"\n            }\n          }\n        }\n      ]\n    }\n  },\n  {\n    \"apiVersion\": \"serving.kserve.io/v1alpha1\",\n    \"kind\": \"InferenceGraph\",\n    \"metadata\": {\n      \"name\": \"ensemble-model\"\n    },\n    \"spec\": {\n      \"nodes\": {\n        \"root\": {\n          \"routerType\": \"Ensemble\",\n          \"steps\": [\n            {\n              \"serviceName\": \"sklearn-iris\",\n              \"name\": \"sklearn-iris\"\n            },\n            {\n              \"serviceName\": \"xgboost-iris\",\n              \"name\": \"xgboost-iris\"\n            }\n          ]\n        }\n      }\n    }\n  },\n  {\n    \"apiVersion\": \"serving.kserve.io/v1alpha1\",\n    \"kind\": \"ClusterStorageContainer\",\n    \"metadata\": {\n      \"name\": \"default\"\n    },\n    \"spec\": {\n      \"container\": {\n        \"name\": \"storage-initializer\",\n        \"image\": \"kserve/storage-initializer:v0.17.0\",\n        \"resources\": {\n          \"requests\": {\n            \"memory\": \"100Mi\",\n            \"cpu\": \"100m\"\n          },\n          \"limits\": {\n            \"memory\": \"1Gi\",\n            \"cpu\": \"1\"\n          }\n        }\n      },\n      \"supportedUriFormats\": [\n        {\n          \"prefix\": \"gs://\"\n        },\n        {\n          \"prefix\": \"s3://\"\n        },\n        {\n          \"prefix\": \"hdfs://\"\n        },\n        {\n          \"prefix\": \"hf://\"\n        }\n      ],\n      \"workloadType\": \"initContainer\"\n    }\n  },\n  {\n    \"apiVersion\": \"serving.kserve.io/v1alpha2\",\n    \"kind\": \"LLMInferenceService\",\n    \"metadata\": {\n      \"name\": \"facebook-opt-125m\"\n    },\n    \"spec\": {\n      \"model\": {\n        \"uri\": \"hf://facebook/opt-125m\",\n        \"name\": \"facebook/opt-125m\"\n      },\n      \"replicas\": 1,\n      \"router\": {\n        \"route\": {}\n      },\n      \"template\": {\n        \"containers\": [\n          {\n            \"name\": \"main\",\n            \"image\": \"public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo:v0.17.1\",\n            \"env\": [\n              {\n                \"name\": \"VLLM_CPU_KVCACHE_SPACE\",\n                \"value\": \"1\"\n              }\n            ],\n            \"resources\": {\n              \"requests\": {\n                \"cpu\": \"100m\",\n                \"memory\": \"8Gi\"\n              },\n              \"limits\": {\n                \"cpu\": \"1\",\n                \"memory\": \"10Gi\"\n              }\n            }\n          }\n        ]\n      }\n    }\n  },\n  {\n    \"apiVersion\": \"serving.kserve.io/v1alpha1\",\n    \"kind\": \"LLMInferenceService\",\n    \"metadata\": {\n      \"name\": \"facebook-opt-125m\"\n    },\n    \"spec\": {\n      \"model\": {\n        \"uri\": \"hf://facebook/opt-125m\",\n        \"name\": \"facebook/opt-125m\"\n      },\n      \"replicas\": 1,\n      \"router\": {\n        \"scheduler\": {},\n        \"route\": {},\n        \"gateway\": {}\n      },\n      \"template\": {\n        \"containers\": [\n          {\n            \"name\": \"main\",\n            \"image\": \"public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo:v0.17.1\",\n            \"env\": [\n              {\n                \"name\": \"VLLM_CPU_KVCACHE_SPACE\",\n                \"value\": \"1\"\n              }\n            ],\n            \"resources\": {\n              \"requests\": {\n                \"cpu\": \"100m\",\n                \"memory\": \"8Gi\"\n              },\n              \"limits\": {\n                \"cpu\": \"1\",\n                \"memory\": \"10Gi\"\n              }\n            }\n          }\n        ]\n      }\n    }\n  },\n  {\n    \"apiVersion\": \"serving.kserve.io/v1alpha2\",\n    \"kind\": \"LLMInferenceServiceConfig\",\n    \"metadata\": {\n      \"name\": \"llmisvc-config\"\n    },\n    \"spec\": {\n      \"template\": {\n        \"containers\": [\n          {\n            \"name\": \"main\",\n            \"image\": \"ghcr.io/llm-d/llm-d-cuda:v0.6.0\"\n          }\n        ]\n      }\n    }\n  },\n  {\n    \"apiVersion\": \"serving.kserve.io/v1alpha1\",\n    \"kind\": \"LLMInferenceServiceConfig\",\n    \"metadata\": {\n      \"name\": \"llmisvc-config\"\n    },\n    \"spec\": {\n      \"template\": {\n        \"containers\": [\n          {\n            \"name\": \"main\",\n            \"image\": \"ghcr.io/llm-d/llm-d-cuda:v0.6.0\"\n          }\n        ]\n      }\n    }\n  },\n  {\n    \"apiVersion\": \"serving.kserve.io/v1alpha1\",\n    \"kind\": \"ServingRuntime\",\n    \"metadata\": {\n      \"name\": \"kserve-sklearnserver\"\n    },\n    \"spec\": {\n      \"supportedModelFormats\": [\n        {\n          \"name\": \"sklearn\",\n          \"version\": \"1\",\n          \"autoSelect\": true\n        }\n      ],\n      \"containers\": [\n        {\n          \"name\": \"kserve-container\",\n          \"image\": \"kserve/sklearnserver:v0.17.0\",\n          \"args\": [\n            \"--model_name={{.Name}}\",\n            \"--model_dir=/mnt/models\",\n            \"--http_port=8080\"\n          ],\n          \"resources\": {\n            \"requests\": {\n              \"cpu\": \"1\",\n              \"memory\": \"2Gi\"\n            },\n            \"limits\": {\n              \"cpu\": \"1\",\n              \"memory\": \"2Gi\"\n            }\n          }\n        }\n      ]\n    }\n  },\n  {\n    \"apiVersion\": \"serving.kserve.io/v1alpha1\",\n    \"kind\": \"TrainedModel\",\n    \"metadata\": {\n      \"name\": \"model1-sklearn\"\n    },\n    \"spec\": {\n      \"inferenceService\": \"sklearn-iris\",\n      \"model\": {\n        \"storageUri\": \"gs://kfserving-examples/models/sklearn/1.0/model\",\n        \"framework\": \"sklearn\",\n        \"memory\": \"256Mi\"\n      }\n    }\n  },\n  {\n    \"apiVersion\": \"serving.kserve.io/v1alpha1\",\n    \"kind\": \"LocalModelCache\",\n    \"metadata\": {\n      \"name\": \"meta-llama3-8b-instruct\"\n    },\n    \"spec\": {\n      \"sourceModelUri\": \"hf://meta-llama/meta-llama-3-8b-instruct\",\n      \"modelSize\": \"10Gi\",\n      \"nodeGroups\": [\n        \"workers\"\n      ]\n    }\n  },\n  {\n    \"apiVersion\": \"serving.kserve.io/v1alpha1\",\n    \"kind\": \"LocalModelNamespaceCache\",\n    \"metadata\": {\n      \"name\": \"namespace-model-cache\"\n    },\n    \"spec\": {\n      \"sourceModelUri\": \"hf://meta-llama/meta-llama-3-8b-instruct\",\n      \"modelSize\": \"10Gi\",\n      \"nodeGroups\": [\n        \"workers\"\n      ]\n    }\n  },\n  {\n    \"apiVersion\": \"serving.kserve.io/v1alpha1\",\n    \"kind\": \"LocalModelNodeGroup\",\n    \"metadata\": {\n      \"name\": \"workers\"\n    },\n    \"spec\": {\n      \"storageLimit\": \"100Gi\",\n      \"persistentVolumeClaimSpec\": {\n        \"accessModes\": [\n          \"ReadWriteOnce\"\n        ],\n        \"resources\": {\n          \"requests\": {\n            \"storage\": \"100Gi\"\n          }\n        }\n      }\n    }\n  },\n  {\n    \"apiVersion\": \"serving.kserve.io/v1alpha1\",\n    \"kind\": \"LocalModelNode\",\n    \"metadata\": {\n      \"name\": \"worker-node-1\"\n    },\n    \"spec\": {\n      \"localModels\": [\n        {\n          \"sourceModelUri\": \"hf://meta-llama/meta-llama-3-8b-instruct\",\n          \"modelName\": \"meta-llama-3-8b-instruct\"\n        }\n      ]\n    }\n  },\n  {\n    \"apiVersion\": \"inference.networking.k8s.io/v1\",\n    \"kind\": \"InferencePool\",\n    \"metadata\": {\n      \"name\": \"llm-pool\"\n    },\n    \"spec\": {\n      \"endpointPickerRef\": {\n        \"name\": \"inference-scheduler\",\n        \"port\": {\n          \"number\": 9002\n        }\n      },\n      \"selector\": {\n        \"matchLabels\": {\n          \"app\": \"llm-inference\"\n        }\n      }\n    }\n  },\n  {\n    \"apiVersion\": \"inference.networking.x-k8s.io/v1alpha2\",\n    \"kind\": \"InferencePool\",\n    \"metadata\": {\n      \"name\": \"llm-pool\"\n    },\n    \"spec\": {\n      \"extensionRef\": {\n        \"name\": \"inference-scheduler\",\n        \"portNumber\": 9002\n      },\n      \"selector\": {\n        \"app\": \"llm-inference\"\n      },\n      \"targetPortNumber\": 8000\n    }\n  },\n  {\n    \"apiVersion\": \"inference.networking.x-k8s.io/v1alpha2\",\n    \"kind\": \"InferenceModelRewrite\",\n    \"metadata\": {\n      \"name\": \"model-rewrite\"\n    },\n    \"spec\": {\n      \"poolRef\": {\n        \"name\": \"llm-pool\",\n        \"group\": \"inference.networking.k8s.io\",\n        \"kind\": \"InferencePool\"\n      }\n    }\n  },\n  {\n    \"apiVersion\": \"inference.networking.x-k8s.io/v1alpha2\",\n    \"kind\": \"InferenceObjective\",\n    \"metadata\": {\n      \"name\": \"inference-objective\"\n    },\n    \"spec\": {\n      \"poolRef\": {\n        \"name\": \"llm-pool\",\n        \"group\": \"inference.networking.k8s.io\",\n        \"kind\": \"InferencePool\"\n      }\n    }\n  },\n  {\n    \"apiVersion\": \"inference.networking.x-k8s.io/v1alpha1\",\n    \"kind\": \"InferencePoolImport\",\n    \"metadata\": {\n      \"name\": \"pool-import\"\n    },\n    \"spec\": {\n      \"pool\": {\n        \"name\": \"llm-pool\"\n      }\n    }\n  }\n]"
