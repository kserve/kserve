[project]
name = "custom-model"
version = "0.15.1"
description = "Custom model implementation. Not intended for use outside KServe Frameworks Images."
authors = ["The KServe Authors"]
license = "Apache-2.0"
packages = [
    { include = "*.py" }
]


[tool.uv.sources]
# For PyTorch CPU on Linux x86_64 with Python 3.11
torch = { url = "https://download.pytorch.org/whl/cpu/torch-2.3.0%2Bcpu-cp311-cp311-linux_x86_64.whl" }
torchvision = { url = "https://download.pytorch.org/whl/cpu/torchvision-0.18.0%2Bcpu-cp311-cp311-linux_x86_64.whl" }
[dependency-groups]
dev = ["black[colorama]~=24.3.0"]
