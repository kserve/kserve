[project]
name = "custom_transformer"
version = "0.15.0"
description = "Custom Transformer Examples. Not intended for use outside KServe Frameworks Images."
license = { text = "https://github.com/kserve/kserve/blob/master/LICENSE" }
requires-python = "<3.13,>=3.9"
authors = [{ name = "Dan Sun", email = "dsun20@bloomberg.net" }]
dependencies = [
    "kserve @ file:///${PROJECT_ROOT}/../kserve",
    "torch==2.3.0",
    "torchvision==0.18.0",
    "pillow>=10.3.0,<11.0.0",
]
[tool.uv.sources]
# For PyTorch CPU on Linux x86_64 with Python 3.11
torch = { url = "https://download.pytorch.org/whl/cpu/torch-2.3.0%2Bcpu-cp311-cp311-linux_x86_64.whl" }
torchvision = { url = "https://download.pytorch.org/whl/cpu/torchvision-0.18.0%2Bcpu-cp311-cp311-linux_x86_64.whl" }
[dependency-groups]
test = ["pytest<8.0.0,>=7.4.4", "mypy<1.0,>=0.991"]
dev = ["black[colorama]~=24.3.0"]
