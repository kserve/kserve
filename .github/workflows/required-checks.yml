name: enforce-required-checks
on:
  pull_request:
  merge_group:
    types: [ checks_requested ]
  issue_comment:
    types: [created]
jobs:
  enforce-all-checks:
    if: >-
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/rerun'))
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: job status check
        uses: lewagon/wait-on-check-action@1d57e2c51a58d812d2765e036a028b6bdb5a6154 # v1.8.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          running-workflow-name: enforce-all-checks
          allowed-conclusions: success,skipped
          wait-interval: 60
          checks-discovery-timeout: 300
          verbose: false
