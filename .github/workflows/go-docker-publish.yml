name: Go Components Docker Publisher

on:
  push:
    # Publish `master` as Docker `latest` image.
    branches:
      - master

    # Publish `v1.2.3` tags as releases.
    tags:
      - v*

  # Run tests for any PRs.
  pull_request:
    paths:
      - "cmd/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/go-docker-publish.yml"
      - ".github/actions/free-up-disk-space/**"
  # To save some compute time, rely on PR check and don't run for merge queues
  # merge_group:
  #   types: [ checks_requested ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: kserve-controller
            cmd: manager
          - image: agent
            cmd: agent
          - image: llmisvc-controller
            cmd: llmisvc
          - image: kserve-localmodel-controller
            cmd: localmodel
          - image: kserve-localmodelnode-agent
            cmd: localmodelnode
          - image: router
            cmd: router

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Merge target branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch --unshallow origin
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git config user.email "ci@kserve.io"
          git config user.name "CI Bot"
          git merge --no-edit origin/${{ github.event.pull_request.base.ref }}

      - name: Free-up disk space
        uses: ./.github/actions/free-up-disk-space

      - name: Setup QEMU
        if: github.event_name == 'push'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          cache-image: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          cache-binary: true

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute tag
        if: github.event_name == 'push'
        run: |
          # Strip git ref prefix from version
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')

          # Strip "v" prefix from tag name
          # [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')

          # Use Docker `latest` tag convention
          [ "$VERSION" == "master" ] && VERSION=latest

          echo VERSION=$VERSION >> $GITHUB_ENV

      - name: Build (PR — single platform, no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.image }}
          build-args: |
            CMD=${{ matrix.cmd }}
          push: false

      - name: Build and push (multi-arch)
        if: github.event_name == 'push'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          platforms: linux/amd64,linux/arm/v7,linux/arm64/v8,linux/ppc64le,linux/s390x
          context: .
          file: Dockerfile
          target: ${{ matrix.image }}
          build-args: |
            CMD=${{ matrix.cmd }}
          push: true
          tags: kserve/${{ matrix.image }}:${{ env.VERSION }}
          provenance: false
          sbom: true
