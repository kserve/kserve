        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh "llmisvc"

      - name: Upload test results
        if: always()
        uses: ./.github/actions/upload-test-results
        with:
          name: test-results-llmisvc-tracing-${{ matrix.install-method }}
