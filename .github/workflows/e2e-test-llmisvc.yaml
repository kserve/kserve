          echo "Verifying Jaeger All-in-One deployment..."
          kubectl get pods -n observability
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=jaeger -n observability --timeout=120s
          echo "Jaeger is ready!"

      - name: Run tracing E2E tests
        id: tracing-tests
        timeout-minutes: 30
        run: |
          export PYTEST_MAXFAIL=2
          ./test/scripts/gh-actions/run-e2e-tests.sh "llminferenceservice and tracing and cluster_cpu" 0 "envoy-gateway"

