name: LLMInferenceService E2E Tests

on:
  pull_request:
    paths:
      - "pkg/apis/serving/v1alpha1/llm*"
      - "pkg/apis/serving/v1alpha2/llm*"
      - "pkg/controller/v1alpha1/llmisvc/**"
      - "pkg/controller/v1alpha2/llmisvc/**"
      - "charts/kserve-llmisvc-resources/**"
      - "config/llmisvc/**"
      - "config/llmisvcconfig/**"
      - "config/rbac/llmisvc/**"
      - "cmd/llmisvc/**"
      - "test/e2e/llmisvc/**"
      - ".github/workflows/e2e-test-llmisvc.yaml"
      - ".github/actions/**"
      - "hack/setup/quick-install/llmisvc-dependency-install.sh"
      - "hack/setup/infra/manage.prometheus-helm.sh"
      - "hack/setup/infra/manage.prometheus-adapter-helm.sh"
      - "hack/setup/infra/manage.wva-kustomize.sh"
      - "hack/setup/infra/manage.jaeger-helm.sh"
      - "hack/setup/infra/manage.kserve-helm.sh"
      - "hack/setup/quick-install/*-helm.sh"
  merge_group:
    types: [ checks_requested ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TAG: ${{ github.sha }}
  DOCKER_IMAGES_PATH: "/mnt/docker-images"
  KO_DOCKER_REPO: "kserve"
  ENABLE_LLMISVC: "true"

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      install_methods: ${{ steps.set-matrix.outputs.install_methods }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Merge target branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch --unshallow origin
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git config user.email "ci@kserve.io"
          git config user.name "CI Bot"
          git merge --no-edit origin/${{ github.event.pull_request.base.ref }}
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            charts:
              - 'charts/**'
            non_charts:
              - '**'
              - '!charts/**'
      - id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo 'install_methods=["kustomize","helm"]' >> $GITHUB_OUTPUT
          elif [[ "${{ steps.filter.outputs.charts }}" == "true" && \
                  "${{ steps.filter.outputs.non_charts }}" == "true" ]]; then
            echo 'install_methods=["kustomize","helm"]' >> $GITHUB_OUTPUT
          elif [[ "${{ steps.filter.outputs.charts }}" == "true" ]]; then
            echo 'install_methods=["helm"]' >> $GITHUB_OUTPUT
          else
            echo 'install_methods=["kustomize"]' >> $GITHUB_OUTPUT
          fi

  llmisvc-image-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Merge target branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch --unshallow origin
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git config user.email "ci@kserve.io"
          git config user.name "CI Bot"
          git merge --no-edit origin/${{ github.event.pull_request.base.ref }}

      - name: Load KServe environment variables
        run: ./kserve-images.sh --ci

      - name: Free-up disk space
        uses: ./.github/actions/free-up-disk-space

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          cache-binary: true

      - name: Build LLMISvc image
        run: |
          sudo mkdir -p ${DOCKER_IMAGES_PATH}
          sudo chown -R $USER ${DOCKER_IMAGES_PATH}
          ./test/scripts/gh-actions/build-images.sh llmisvc
          docker image ls
          sudo ls -lh ${DOCKER_IMAGES_PATH}

      - name: Upload LLMISvc controller image
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.LLMISVC_CONTROLLER_IMG }}-${{ env.TAG }}
          path: ${{ env.DOCKER_IMAGES_PATH }}/${{ env.LLMISVC_CONTROLLER_IMG }}-${{ env.TAG }}
          compression-level: 0
          if-no-files-found: error

      - name: Upload storage-initializer image
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.STORAGE_INIT_IMG }}-${{ env.TAG }}
          path: ${{ env.DOCKER_IMAGES_PATH }}/${{ env.STORAGE_INIT_IMG }}-${{ env.TAG }}
          compression-level: 0
          if-no-files-found: error

  seed-model-cache:
    runs-on: ubuntu-latest
    needs: [llmisvc-image-build]
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Load KServe environment variables
        run: ./kserve-images.sh --ci

      - name: Free-up disk space
        uses: ./.github/actions/free-up-disk-space

      - name: Download storage-initializer image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ env.STORAGE_INIT_IMG }}-${{ env.TAG }}
          path: ./tmp

      - name: Load storage-initializer image
        run: docker load < ./tmp/${{ env.STORAGE_INIT_IMG }}-${{ env.TAG }}

      - name: Download opt-125m from HuggingFace
        timeout-minutes: 30
        run: |
          mkdir -p /tmp/model-cache && chmod a+rwx /tmp/model-cache
          docker run --rm \
            --network host \
            -v /tmp/model-cache:/mnt/models \
            -e HF_HUB_DISABLE_PROGRESS_BARS=1 \
            -e TOKIO_WORKER_THREADS=1 \
            -e STORAGE_IGNORE_PATTERNS="*.msgpack,*.h5,flax_model*,tf_model*,rust_model*" \
            ${{ env.KO_DOCKER_REPO }}/${{ env.STORAGE_INIT_IMG }}:${{ env.TAG }} \
            hf://facebook/opt-125m /mnt/models

      - name: Package model as OCI image
        run: |
          printf 'FROM busybox\nCOPY . /model\n' > /tmp/Dockerfile
          docker build -t kserve/opt-125m-cache:${{ env.TAG }} -f /tmp/Dockerfile /tmp/model-cache
          docker save kserve/opt-125m-cache:${{ env.TAG }} -o /tmp/opt-125m-cache.tar

      - name: Upload model cache artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: opt-125m-model-cache-${{ env.TAG }}
          path: /tmp/opt-125m-cache.tar
          compression-level: 0
          if-no-files-found: error

  test-llmisvc:
    runs-on: cncf-ubuntu-16-64-x86
    needs: [detect-changes, llmisvc-image-build, seed-model-cache]
    strategy:
      fail-fast: false
      matrix:
        install-method: ${{ fromJSON(needs.detect-changes.outputs.install_methods) }}
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Merge target branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch --unshallow origin
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git config user.email "ci@kserve.io"
          git config user.name "CI Bot"
          git merge --no-edit origin/${{ github.event.pull_request.base.ref }}

      - name: Load KServe environment variables
        run: ./kserve-images.sh --ci

      - name: Free-up disk space
        uses: ./.github/actions/free-up-disk-space

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.9"

      - name: Setup Minikube
        uses: ./.github/actions/minikube-setup

      - name: Download LLMISvc controller image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ env.LLMISVC_CONTROLLER_IMG }}-${{ env.TAG }}
          path: ./tmp

      - name: Download storage-initializer image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ env.STORAGE_INIT_IMG }}-${{ env.TAG }}
          path: ./tmp

      - name: Load docker images
        uses: ./.github/actions/load-docker-images
        with:
          directory: ./tmp

      - name: Download model cache artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: opt-125m-model-cache-${{ env.TAG }}
          path: ./tmp

      - name: Load model cache into minikube
        run: |
          minikube image load ./tmp/opt-125m-cache.tar
          echo "OPT_125M_CACHE_IMAGE=kserve/opt-125m-cache:${{ env.TAG }}" >> $GITHUB_ENV

      - name: KServe dependency setup
        uses: ./.github/actions/kserve-dep-setup
        with:
          deploy-llmisvc: "true"

      - name: Install UV
        run: ./test/scripts/gh-actions/setup-uv.sh

      - name: Install KServe
        run: |
          ${{ matrix.install-method == 'helm' && 'export INSTALL_METHOD="helm"' || '' }}
          ./test/scripts/gh-actions/setup-kserve.sh

      - name: Verify LLMISvc setup
        run: |
          echo "🔍 Verifying LLMISvc controller setup..."

          echo "📋 LLMISvc Controller:"
          kubectl get pods -n kserve -l app.kubernetes.io/component=controller || true

          echo "📋 LLM Resources:"
          kubectl get llminferenceserviceconfigs -A || true

          echo "📋 Gateway API Resources:"
          kubectl get crd | grep inference || true

          echo "📋 Envoy Gateway:"
          kubectl get pods -n envoy-gateway-system || true

          echo "📋 AI Gateway:"
          kubectl get pods -n envoy-ai-gateway-system || true

          echo "✅ LLMISvc setup verification complete!"

      - name: Run LLMInferenceService E2E tests
        id: llmisvc-e2e-tests
        timeout-minutes: 90
        env:
          OPT_125M_MODEL_URI: "s3://example-models/facebook/opt-125m"
        run: |
          # Run only CPU tests for now using pytest markers (cluster_)
          # Available GPU vendors: amd, nvidia, intel
          export PYTEST_MAXFAIL=3
          ./test/scripts/gh-actions/run-e2e-tests.sh "llminferenceservice and llmisvc_core and cluster_cpu" 0 "envoy-gateway"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh "llmisvc"

      - name: Upload test results
        if: always()
        uses: ./.github/actions/upload-test-results
        with:
          name: test-results-llmisvc-${{ matrix.install-method }}

  test-llmisvc-wva-autoscaling-hpa:
    runs-on: cncf-ubuntu-16-64-x86
    needs: [detect-changes, llmisvc-image-build, seed-model-cache]
    strategy:
