[pytest]
log_cli = 1
log_level = INFO
log_cli_level = INFO
markers =
    explainer: explainer tests
    transformer: transformer tests
    mms: multi model tests
    grpc: grpc tests
    graph: inference graph tests
    helm: helm e2e tests
    raw: raw e2e tests
    autoscaling: e2e tests for autoscaling
    rawcipn: raw e2e tests with cluster ip none
    kourier: e2e tests using kourier as networking layer
    collocation: transformer and predictor collocation e2e tests
    predictor: predictor e2e tests including grpc
    path_based_routing: e2e tests for path based routing
    marshaller: marshaller e2e tests
    llm: e2e tests for huggingface runtime
    vllm: e2e tests for huggingface runtime with vllm-openvino backend
    vllm_runtime: e2e tests for the standalone kserve-vllmserver ClusterServingRuntime
    modelcache: e2e tests for model caching
    llminferenceservice: e2e tests for llm inference service controller
    llmisvc_core: core LLMISVC e2e tests
    llmisvc_autoscaling: LLMISVC autoscaling e2e tests
    autoscaling_hpa: e2e tests for HPA-based autoscaling
    autoscaling_keda: e2e tests for KEDA-based autoscaling
    conversion: e2e tests for llm inference service api version conversion
    model_routing: model-based routing e2e tests
    lora: e2e tests for LoRA adapters
    pvc_storage: PVC storage e2e tests
    tracing: distributed tracing e2e tests
    flow_control: flow control e2e tests
    cluster_cpu: test targeting cluster with CPU
    cluster_amd: test targeting cluster with AMD
    cluster_intel: test targeting cluster with Intel
    cluster_nvidia: test targeting cluster with NVIDIA
    cluster_nvidia_roce: test targeting cluster with NVIDIA ROCe
    cluster_single_node: test targeting single node cluster
    cluster_multi_node: test targeting multi node cluster
    cluster_gpu: test targeting cluster with GPU
    no_scheduler: test without scheduler
    custom_gateway: test creating custom gateway resources
    auth: e2e tests for authentication and authorization
    llmd_simulator: test using llm-d simulator
    dual_protocol: test for dual protocol gRPC and REST predictor for Standard mode with Gateway API
    autogluon: e2e tests for autogluon runtime
    storage: e2e tests for storage URI schemes (oci+native://, pvc://, etc.)
