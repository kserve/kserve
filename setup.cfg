[codespell]
# Generated/vendored files and binary data
skip = *.json,*.yaml,*.yml,*.svg,go.sum,go.mod,*.pb.go,*.pb,swagger.json,openapi_generated.go,.git,vendor,node_modules,
# Generated install manifests contain upstream words flagged by codespell
    ./install,./hack/setup/quick-install,
# Tokenizer vocabulary — subword tokens trigger false positives
    ./python/custom_tokenizer/vocab.txt,
# Sample training data
    ./docs/samples/v1beta1/sklearn
# Go CamelCase identifiers: WithT (gomega helper), UpToDate/NotIn (constants)
# Auto-generated Python: querys (OpenAPI Generator api_client.py), maxium (datamodel-codegen openapi.py)
# Valid terms: re-use, keep-alives (HTTP idle timeout), ist/Worte (German in test assertions)
ignore-words-list = witht,uptodate,notin,querys,maxium,re-use,keep-alives,ist,worte
count =
