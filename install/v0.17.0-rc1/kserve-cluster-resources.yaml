apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: kserve-config-llm-worker-data-parallel
  namespace: kserve
spec:
  template:
    containers:
    - command:
      - /bin/bash
