apiVersion: apps/v1
kind: Deployment
metadata:
  name: kserve-kernelcache-controller-manager
  namespace: kserve
  labels:
    app.kubernetes.io/name: kserve-kernelcache-controller-manager
    control-plane: kserve-kernelcache-controller-manager
    controller-tools.k8s.io: "1.0"
spec:
  selector:
    matchLabels:
      control-plane: kserve-kernelcache-controller-manager
      controller-tools.k8s.io: "1.0"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kserve-kernelcache-controller-manager
        control-plane: kserve-kernelcache-controller-manager
        controller-tools.k8s.io: "1.0"
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: kserve-kernelcache-controller-manager
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        image: ko://github.com/kserve/kserve/cmd/kernelcache
        imagePullPolicy: Always
        name: manager
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        env:
          # HOME must be writable for cosign TUF cache (distroless has read-only /)
          - name: HOME
            value: "/tmp"
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          # Enable Kyverno image verification (requires Kyverno ImageVerificationPolicy)
          # Set to "true" to enable cosign signature verification via Kyverno
          # Default: "false" (disabled) - webhook performs cosign verification and resolves
          # digest directly from registry
          - name: KYVERNO_VERIFICATION_ENABLED
            value: "false"
          # HMAC secret for mutation signature (prevents digest tampering)
          # Generated by: make kernelcache-webhook-secret-file
          - name: MUTATION_SIGNING_KEY
            valueFrom:
              secretKeyRef:
                name: kernelcache-webhook-key
                key: MUTATION_SIGNING_KEY
          # Sigstore TUF cache directory (must be writable, distroless has read-only /)
          # Cosign uses this for caching Sigstore trust root metadata
          - name: SIGSTORE_ROOT_DIR
            value: "/tmp/.sigstore"
        livenessProbe:
          failureThreshold: 5
          initialDelaySeconds: 30
          httpGet:
            path: /healthz
            port: 8081
          timeoutSeconds: 5
        readinessProbe:
          initialDelaySeconds: 30
          failureThreshold: 5
          periodSeconds: 5
          httpGet:
            path: /readyz
            port: 8081
          timeoutSeconds: 5
        resources:
          limits:
            cpu: 100m
            memory: 300Mi
          requests:
            cpu: 100m
            memory: 200Mi
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        volumeMounts:
        - mountPath: /tmp
          name: tmp
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      terminationGracePeriodSeconds: 10
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cert
        secret:
          defaultMode: 420
          secretName: kernelcache-webhook-server-cert
