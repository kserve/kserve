# Patch to add conversion webhook configuration to LLMInferenceService CRD
# This enables automatic v1alpha1 <-> v1alpha2 API version conversion
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: llminferenceservices.serving.kserve.io
  annotations:
    cert-manager.io/inject-ca-from: "{{ .Release.Namespace }}/llmisvc-serving-cert"
spec:
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          name: llmisvc-webhook-server-service
          namespace: "{{ .Release.Namespace }}"
          path: /convert
          port: 443
      conversionReviewVersions:
        - v1
        - v1beta1
