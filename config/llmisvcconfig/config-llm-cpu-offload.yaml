apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: kserve-config-llm-cpu-offload
spec:
  template:
    containers:
      - image: ghcr.io/llm-d/llm-d-cuda:v0.6.0
        imagePullPolicy: IfNotPresent
        name: main
        ports:
          - containerPort: 8000
            protocol: TCP
        command:
          - "/bin/bash"
          - "-c"
          - |-
            # --disable-access-log-for-endpoints landed in vLLM 0.16.0 (vllm-project/vllm#30011).
            # Older versions still need the blanket --disable-uvicorn-access-log.
            ACCESS_LOG_ARGS="--disable-uvicorn-access-log"
            VLLM_VERSION=$(vllm --version 2>/dev/null | tail -1 | awk '{print $NF}')
            echo "[access-log-detect] vllm version='${VLLM_VERSION}'"
            if [[ "$VLLM_VERSION" =~ ^[0-9]+\.[0-9]+ ]] && [ "$(printf '%s\n%s\n' "0.16.0" "${VLLM_VERSION}" | sort -V | head -1)" = "0.16.0" ]; then
              ACCESS_LOG_ARGS="--disable-access-log-for-endpoints /health,/metrics,/ping"
            fi
            echo "[access-log-detect] selected ACCESS_LOG_ARGS='${ACCESS_LOG_ARGS}'"

            # --shutdown-timeout landed in vLLM 0.18.0 (vllm-project/vllm#36666).
            SHUTDOWN_TIMEOUT_ARGS=""
            if [[ "$VLLM_VERSION" =~ ^[0-9]+\.[0-9]+ ]] && [ "$(printf '%s\n%s\n' "0.18.0" "${VLLM_VERSION}" | sort -V | head -1)" = "0.18.0" ]; then
              SHUTDOWN_TIMEOUT_ARGS="--shutdown-timeout {{ shutdownTimeout .Spec.Template 15 }}"
            fi

            if [ -n "${VLLM_CPU_OFFLOAD_BYTES:-}" ]; then
              VLLM_KV_TRANSFER_ARGS="--kv-transfer-config '{\"kv_connector\":\"OffloadingConnector\",\"kv_role\":\"kv_both\",\"kv_connector_extra_config\":{\"spec_name\":\"TieringOffloadingSpec\",\"cpu_bytes_to_use\":${VLLM_CPU_OFFLOAD_BYTES}}}'"
            fi

            eval "exec vllm serve /mnt/models \
              --served-model-name "{{ .Spec.Model.Name }}" "publishers/{{ .ObjectMeta.Namespace }}/models/{{ .Spec.Model.Name }}" \
              --port 8000 \
              ${ACCESS_LOG_ARGS} \
              ${SHUTDOWN_TIMEOUT_ARGS} \
              {{ if .GlobalConfig.EnableTLS }}--enable-ssl-refresh{{- end }} \
              {{ if .GlobalConfig.EnableTLS }}--ssl-certfile /var/run/kserve/tls/tls.crt{{- end }} \
              {{ if .GlobalConfig.EnableTLS }}--ssl-keyfile /var/run/kserve/tls/tls.key{{- end }} \
              ${VLLM_KV_TRANSFER_ARGS:-} \
              ${VLLM_ADDITIONAL_ARGS} \
              $@"
          # "--" ends bash options; subsequent args become positional params ($@) forwarded to vllm serve
          - "--"
        env:
          - name: HOME
            value: /home
          - name: VLLM_LOGGING_LEVEL
            value: INFO
          - name: HF_HUB_CACHE
            value: /models
          - name: VLLM_CPU_OFFLOAD_BYTES
            value: "10737418240"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sleep
              - "15"
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: FallbackToLogsOnError
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 60
        startupProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          failureThreshold: 60
          periodSeconds: 10
        volumeMounts:
          - mountPath: /home
            name: home
          - mountPath: /tmp
            name: tmp-dir
          - mountPath: /dev/shm
            name: dshm
          - mountPath: /models
            name: model-cache
          - mountPath: /var/run/kserve/tls
            name: tls-certs
            readOnly: true
    terminationGracePeriodSeconds: 60
    volumes:
      - emptyDir: { }
        name: home
      - emptyDir:
          medium: Memory
          sizeLimit: 1Gi
        name: dshm
      - emptyDir: { }
        name: model-cache
      - emptyDir: { }
        name: tmp-dir
      - name: tls-certs
        secret:
          secretName: "{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}"
