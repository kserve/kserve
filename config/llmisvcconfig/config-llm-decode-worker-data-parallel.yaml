apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: kserve-config-llm-decode-worker-data-parallel
spec:
  annotations:
    serving.kserve.io/model-based-routing-enabled: "true"
  template:
    initContainers:
      - name: llm-d-routing-sidecar
        imagePullPolicy: IfNotPresent
        image: ghcr.io/llm-d/llm-d-router-disagg-sidecar:v0.9.0-rc.2
        restartPolicy: Always
        ports:
          - containerPort: 8000
            protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          # nvidia-cdi-hook requires a writable root filesystem
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: FallbackToLogsOnError
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
        command:
          - "/app/pd-sidecar"
          - "--port=8000"
          - "--vllm-port=8001"
          - "--kv-connector=nixlv2"
          - "--enable-ssrf-protection=true"
          - "--pool-group=inference.networking.x-k8s.io"
          - "--inference-pool={{ .GlobalConfig.InferencePoolNamespacedName }}"
          - '{{ if .GlobalConfig.EnableTLS }}--secure-proxy=true{{else}}--secure-proxy=false{{- end }}'
          - '{{ if .GlobalConfig.EnableTLS }}--cert-path=/var/run/kserve/tls{{- end }}'
          - '{{ if .GlobalConfig.EnableTLS }}--decoder-use-tls=true{{- end }}'
          - '{{ if .GlobalConfig.EnableTLS }}--prefiller-use-tls=true{{- end }}'
        volumeMounts:
          - mountPath: /var/run/kserve/tls
            name: tls-certs
            readOnly: true
        env:
          - name: INFERENCE_POOL_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: SSL_CERT_DIR
            value: "/var/run/kserve/tls:/var/run/secrets/kubernetes.io/serviceaccount:/etc/pki/tls/certs"
    containers:
      - image: ghcr.io/llm-d/llm-d-cuda:v0.7.0
        imagePullPolicy: IfNotPresent
        name: main
        ports:
          - containerPort: 8001
            protocol: TCP
        command:
          - "/bin/bash"
          - "-c"
          - |-
            {{ dpAddressResolveScript }}

            {{ rdmaDetectScript }}

            START_RANK=0

            {{ vllmVersionScript }}

            {{ vllmAccessLogDetectScript }}

            {{ shutdownTimeoutScript .Spec.Template 15 }}

            {{ kvTransferScript .Spec.KVCacheOffloading }}

            eval "exec vllm serve \
              /mnt/models \
              --served-model-name "{{ .Spec.Model.Name }}" "publishers/{{ .ObjectMeta.Namespace }}/models/{{ .Spec.Model.Name }}" \
              --port 8001 \
              --api-server-count ${VLLM_API_SERVER_COUNT:-8} \
              {{- if .Spec.Parallelism.Expert -}}--enable-expert-parallel{{- end }} \
              {{- if .Spec.Parallelism.Tensor -}}--tensor-parallel-size {{ .Spec.Parallelism.Tensor }}{{- end }} \
              --data-parallel-size {{ or .Spec.Parallelism.Data 1 }} \
              --data-parallel-size-local {{ or .Spec.Parallelism.DataLocal 1 }} \
              --data-parallel-address ${DP_ADDRESS} \
              --data-parallel-rpc-port {{ if .Spec.Parallelism.DataRPCPort }}{{ .Spec.Parallelism.DataRPCPort }}{{ else }}5555{{- end }} \
              --data-parallel-start-rank $START_RANK \
              ${ACCESS_LOG_ARGS} \
              ${SHUTDOWN_TIMEOUT_ARGS} \
              ${KV_TRANSFER_ARGS} \
              {{ if .GlobalConfig.EnableTLS }}--enable-ssl-refresh{{- end }} \
              {{ if .GlobalConfig.EnableTLS }}--ssl-certfile /var/run/kserve/tls/tls.crt{{- end }} \
              {{ if .GlobalConfig.EnableTLS }}--ssl-keyfile /var/run/kserve/tls/tls.key{{- end }} \
              ${VLLM_ADDITIONAL_ARGS} \
              $@"
          # "--" ends bash options; subsequent args become positional params ($@) forwarded to vllm serve
          - "--"

        env:
          - name: HOME
            value: /home
          - name: VLLM_LOGGING_LEVEL
            value: INFO
          - name: HF_HUB_CACHE
            value: /models
        securityContext:
          allowPrivilegeEscalation: false
          # nvidia-cdi-hook requires a writable root filesystem
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
              - "NET_RAW"
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sleep
              - "15"
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: FallbackToLogsOnError
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          periodSeconds: 1
          timeoutSeconds: 1
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health
            port: 8001
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          failureThreshold: 60
          periodSeconds: 10
        volumeMounts:
          - mountPath: /home
            name: home
          - mountPath: /tmp
            name: tmp-dir
          - mountPath: /dev/shm
            name: dshm
          - mountPath: /models
            name: model-cache
          - mountPath: /var/run/kserve/tls
            name: tls-certs
            readOnly: true
    terminationGracePeriodSeconds: 60
    volumes:
      - emptyDir: { }
        name: home
      - emptyDir: { }
        name: tmp-dir
      - emptyDir:
          medium: Memory
          sizeLimit: 8Gi
        name: dshm
      - emptyDir: { }
        name: model-cache
      - name: tls-certs
        secret:
          secretName: "{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}"
  worker:
    containers:
      - image: ghcr.io/llm-d/llm-d-cuda:v0.7.0
        imagePullPolicy: IfNotPresent
        name: main
        ports:
          - containerPort: 8001
            protocol: TCP
        command:
          - "/bin/bash"
          - "-c"
          - |-
            {{ dpAddressResolveScript }}

            {{ rdmaDetectScript }}

            START_RANK=$(( ${LWS_WORKER_INDEX:-0} * {{ or .Spec.Parallelism.DataLocal 1 }} ))

            {{ vllmVersionScript }}

            {{ vllmAccessLogDetectScript }}

            {{ shutdownTimeoutScript .Spec.Worker 15 }}

            {{ kvTransferScript .Spec.KVCacheOffloading }}

            eval "exec vllm serve \
              /mnt/models \
              --served-model-name "{{ .Spec.Model.Name }}" "publishers/{{ .ObjectMeta.Namespace }}/models/{{ .Spec.Model.Name }}" \
              --port 8001 \
              {{- if .Spec.Parallelism.Expert }}--enable-expert-parallel{{- end }} \
              {{- if .Spec.Parallelism.Tensor }}--tensor-parallel-size {{ .Spec.Parallelism.Tensor }}{{- end }} \
              --data-parallel-size {{ or .Spec.Parallelism.Data 1 }} \
              --data-parallel-size-local {{ or .Spec.Parallelism.DataLocal 1 }} \
              --data-parallel-address ${DP_ADDRESS} \
              --data-parallel-rpc-port {{ if .Spec.Parallelism.DataRPCPort }}{{ .Spec.Parallelism.DataRPCPort }}{{ else }}5555{{- end }} \
              --data-parallel-start-rank $START_RANK \
              --headless \
              ${ACCESS_LOG_ARGS} \
              ${SHUTDOWN_TIMEOUT_ARGS} \
              ${KV_TRANSFER_ARGS} \
              {{ if .GlobalConfig.EnableTLS }}--enable-ssl-refresh{{- end }} \
              {{ if .GlobalConfig.EnableTLS }}--ssl-certfile /var/run/kserve/tls/tls.crt{{- end }} \
              {{ if .GlobalConfig.EnableTLS }}--ssl-keyfile /var/run/kserve/tls/tls.key{{- end }} \
              ${VLLM_ADDITIONAL_ARGS} \
              $@"
          # "--" ends bash options; subsequent args become positional params ($@) forwarded to vllm serve
          - "--"

        env:
          - name: HOME
            value: /home
          - name: VLLM_LOGGING_LEVEL
            value: INFO
          - name: HF_HUB_CACHE
            value: /models
          - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
            value: "1"
        securityContext:
          allowPrivilegeEscalation: false
          # nvidia-cdi-hook requires a writable root filesystem
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          capabilities:
            add:
              - "IPC_LOCK"
              - "SYS_RAWIO"
              - "NET_RAW"
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sleep
              - "15"
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
          - mountPath: /home
            name: home
          - mountPath: /tmp
            name: tmp-dir
          - mountPath: /dev/shm
            name: dshm
          - mountPath: /models
            name: model-cache
          - mountPath: /var/run/kserve/tls
            name: tls-certs
            readOnly: true
    terminationGracePeriodSeconds: 60
    volumes:
      - emptyDir: { }
        name: home
      - emptyDir: { }
        name: tmp-dir
      - emptyDir:
          medium: Memory
          sizeLimit: 8Gi
        name: dshm
      - emptyDir: { }
        name: model-cache
      - name: tls-certs
        secret:
          secretName: "{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}"
