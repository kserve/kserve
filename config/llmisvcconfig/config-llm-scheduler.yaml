apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: kserve-config-llm-scheduler
spec:
  router:
    scheduler:
      pool:
        spec:
          endpointPickerRef:
            failureMode: FailOpen
            kind: Service
            name: |-
              {{ ChildName .ObjectMeta.Name `-epp-service` }}
            port:
              number: 9002
          selector:
            matchLabels:
              app.kubernetes.io/name: |-
                {{ .ObjectMeta.Name }}
              app.kubernetes.io/part-of: llminferenceservice
              kserve.io/component: workload
          targetPorts:
            - number: 8000
      annotations:
        "app.kubernetes.io/version": "0.9.0"
      template:
        containers:
          - name: main
            lifecycle:
              preStop:
                exec:
                  command:
                  - /bin/sleep
                  - "15"
            ports:
              - containerPort: 9002
                name: grpc
                protocol: TCP
              - containerPort: 9003
                name: grpc-health
                protocol: TCP
              - containerPort: 9090
                name: metrics
                protocol: TCP
              - containerPort: 5557
                name: zmq
                protocol: TCP
            image: ghcr.io/llm-d/llm-d-router-endpoint-picker:v0.9.0-rc.2
            imagePullPolicy: IfNotPresent
            livenessProbe:
              failureThreshold: 3
              grpc:
                port: 9003
                service: liveness
              initialDelaySeconds: 5
              periodSeconds: 10
              successThreshold: 1
              timeoutSeconds: 1
            readinessProbe:
              failureThreshold: 3
              grpc:
                port: 9003
                service: readiness
              initialDelaySeconds: 30
              periodSeconds: 10
              successThreshold: 1
              timeoutSeconds: 1
            command:
              - /app/epp
              - --pool-name
              - "{{ ChildName .ObjectMeta.Name `-inference-pool` }}"
              - --pool-namespace
              - "{{ .ObjectMeta.Namespace }}"
              - --zap-encoder
              - json
              - --grpc-port
              - "9002"
              - --grpc-health-port
              - "9003"
              - '{{ if .GlobalConfig.EnableTLS }}--enable-cert-reload=true{{- end }}'
              - '{{ if .GlobalConfig.EnableTLS }}--secure-serving=true{{- end }}'
              - '{{ if .GlobalConfig.EnableTLS }}--model-server-metrics-scheme=https{{- end }}'
              - '{{ if .GlobalConfig.EnableTLS }}--cert-path=/var/run/kserve/tls{{- end }}'
            env:
              - name: SSL_CERT_DIR
                value: "/var/run/kserve/tls:/var/run/secrets/kubernetes.io/serviceaccount:/etc/pki/tls/certs"
            resources:
              requests:
                cpu: 256m
                memory: 500Mi
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: FallbackToLogsOnError
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
            volumeMounts:
              - mountPath: /var/run/kserve/tls
                name: tls-certs
                readOnly: true
        volumes:
          - name: tls-certs
            secret:
              secretName: "{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}"
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        terminationGracePeriodSeconds: 60 # must be >= workload terminationGracePeriodSeconds
      tokenizer:
        template:
          containers:
            - name: tokenizer
              image: vllm/vllm-openai-cpu:v0.23.0
              imagePullPolicy: IfNotPresent
              command: ["vllm"]
              args: ["launch", "render", "--port=8000"]
              workingDir: /mnt/models
              env:
                - name: USER
                  value: "vllm"
              ports:
                - containerPort: 8000
                  name: http
                  protocol: TCP
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8000
                periodSeconds: 15
                timeoutSeconds: 5
                failureThreshold: 3
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8000
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3
              startupProbe:
                httpGet:
                  path: /health
                  port: 8000
                periodSeconds: 10
                initialDelaySeconds: 5
                timeoutSeconds: 5
                failureThreshold: 60
              resources:
                requests:
                  cpu: 256m
                  memory: 500Mi
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: FallbackToLogsOnError
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - mountPath: /tmp
                  name: tokenizer-tmp
                - mountPath: /.cache
                  name: tokenizer-cache
          volumes:
            - name: tokenizer-tmp
              emptyDir: {}
            - name: tokenizer-cache
              emptyDir: {}
