apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: kserve-config-llm-scheduler-precise
spec:
  router:
    scheduler:
      template:
        containers:
          - name: tokenizer
            ports:
              - containerPort: 8082
                name: health
                protocol: TCP
            image: ghcr.io/llm-d/llm-d-uds-tokenizer:v0.5.0
            imagePullPolicy: IfNotPresent
            workingDir: /mnt/models
            env:
              - name: TOKENIZERS_DIR
                value: /mnt/models
            livenessProbe:
              httpGet:
                path: /health
                port: 8082
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /health
                port: 8082
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
            startupProbe:
              httpGet:
                path: /health
                port: 8082
              periodSeconds: 10
              initialDelaySeconds: 5
              timeoutSeconds: 5
              failureThreshold: 60
            resources:
              requests:
                cpu: 256m
                memory: 500Mi
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: FallbackToLogsOnError
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
