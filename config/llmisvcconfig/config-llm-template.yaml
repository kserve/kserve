apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: kserve-config-llm-template
spec:
  annotations:
    serving.kserve.io/model-based-routing-enabled: "true"
  template:
    containers:
      - image: ghcr.io/llm-d/llm-d-cuda:v0.7.0
        imagePullPolicy: IfNotPresent
        name: main
        ports:
          - containerPort: 8000
            protocol: TCP
        command:
          - "/bin/bash"
          - "-c"
          - |-
            {{ rdmaDetectScript }}

            {{ vllmVersionScript }}

            {{ vllmAccessLogDetectScript }}

            {{ shutdownTimeoutScript .Spec.Template 15 }}

            {{ kvTransferScript .Spec.KVCacheOffloading }}

            eval "exec vllm serve /mnt/models \
              --served-model-name "{{ .Spec.Model.Name }}" "publishers/{{ .ObjectMeta.Namespace }}/models/{{ .Spec.Model.Name }}" \
              --port 8000 \
              ${ACCESS_LOG_ARGS} \
              ${SHUTDOWN_TIMEOUT_ARGS} \
              ${KV_TRANSFER_ARGS} \
              {{ if .GlobalConfig.EnableTLS }}--enable-ssl-refresh{{- end }} \
              {{ if .GlobalConfig.EnableTLS }}--ssl-certfile /var/run/kserve/tls/tls.crt{{- end }} \
              {{ if .GlobalConfig.EnableTLS }}--ssl-keyfile /var/run/kserve/tls/tls.key{{- end }} \
              ${VLLM_ADDITIONAL_ARGS} \
              $@"
          # "--" ends bash options; subsequent args become positional params ($@) forwarded to vllm serve
          - "--"
        env:
          - name: HOME
            value: /home
          - name: VLLM_LOGGING_LEVEL
            value: INFO
          - name: HF_HUB_CACHE
            value: /models
        securityContext:
          allowPrivilegeEscalation: false
          # nvidia-cdi-hook requires a writable root filesystem
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sleep
              - "15"
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: FallbackToLogsOnError
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          periodSeconds: 1
          timeoutSeconds: 1
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: '{{ if .GlobalConfig.EnableTLS }}HTTPS{{else}}HTTP{{- end }}'
          failureThreshold: 60
          periodSeconds: 10
        volumeMounts:
          - mountPath: /home
            name: home
          - mountPath: /tmp
            name: tmp-dir
          - mountPath: /dev/shm
            name: dshm
          - mountPath: /models
            name: model-cache
          - mountPath: /var/run/kserve/tls
            name: tls-certs
            readOnly: true
    terminationGracePeriodSeconds: 60
    volumes:
      - emptyDir: { }
        name: home
      - emptyDir:
          medium: Memory
          sizeLimit: 1Gi
        name: dshm
      - emptyDir: { }
        name: model-cache
      - emptyDir: { }
        name: tmp-dir
      - name: tls-certs
        secret:
          secretName: "{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}"
