apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: kserve-config-llm-tokenizer
spec:
  router:
    scheduler:
      tokenizer:
        template:
          automountServiceAccountToken: false
          containers:
            - name: vllm-render
              image: docker.io/vllm/vllm-openai-cpu:v0.23.0@sha256:89e1fbe829038b1a560601990c8ec89625c622a969fcbc8f10ce48b6139795be
              imagePullPolicy: IfNotPresent
              command: ["vllm", "launch", "render"]
              args:
                - /mnt/models/base
                - "--port=8000"
              ports:
                - name: render-http
                  containerPort: 8000
                  protocol: TCP
              env:
                - name: HF_HOME
                  value: /tmp/hf
                - name: DO_NOT_TRACK
                  value: "1"
              resources:
                requests:
                  cpu: "1"
                  memory: 4Gi
                limits:
                  cpu: "4"
                  memory: 12Gi
              readinessProbe:
                httpGet:
                  path: /health
                  port: render-http
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 60
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: FallbackToLogsOnError
              volumeMounts:
                - mountPath: /tmp/hf
                  name: hf-cache
          volumes:
            - name: hf-cache
              emptyDir: {}
          dnsPolicy: ClusterFirst
          restartPolicy: Always
