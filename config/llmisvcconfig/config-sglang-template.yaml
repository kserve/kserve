apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceServiceConfig
metadata:
  name: kserve-config-sglang-template
spec:
  template:
    containers:
      # image is intentionally omitted — the ClusterServingRuntime (or ServingRuntime)
      # named by spec.runtime supplies it, so operators pin the SGLang version in one
      # place. spec.template.containers[].image on the LLMInferenceService still
      # wins if the user sets one explicitly.
      - imagePullPolicy: IfNotPresent
        name: main
        ports:
          - containerPort: 8000
            protocol: TCP
        command:
          - "/bin/bash"
          - "-c"
          - |-
            args=(
              python3 -m sglang.launch_server
              --model-path /mnt/models
              --served-model-name "{{ .Spec.Model.Name }}"
              --port 8000
              --host 0.0.0.0
              {{- if and .Spec.Parallelism .Spec.Parallelism.Tensor }} --tp {{ .Spec.Parallelism.Tensor }}{{- end }}
              {{- if .Spec.TrustRemoteCode }} --trust-remote-code{{- end }}
            )
            exec "${args[@]}" "$@"
          # "--" ends bash options; subsequent args become positional params ($@) forwarded to sglang
          - "--"
        env:
          - name: HOME
            value: /home
          - name: HF_HUB_CACHE
            value: /models
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: FallbackToLogsOnError
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 60
        startupProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          failureThreshold: 60
          periodSeconds: 10
          timeoutSeconds: 10
        volumeMounts:
          - mountPath: /home
            name: home
          - mountPath: /tmp
            name: tmp-dir
          - mountPath: /dev/shm
            name: dshm
          - mountPath: /models
            name: model-cache
    terminationGracePeriodSeconds: 30
    volumes:
      - emptyDir: { }
        name: home
      - emptyDir:
          medium: Memory
          sizeLimit: 1Gi
        name: dshm
      - emptyDir: { }
        name: model-cache
      - emptyDir: { }
        name: tmp-dir
