apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kserve-kernelcachenode-agent
  namespace: kserve
spec:
  template:
    spec:
      containers:
        - name: manager
          command:
          image: kserve/kserve-kernelcachenode-agent:latest
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 100m
              memory: 300Mi
            requests:
              cpu: 50m
              memory: 200Mi
