kind: SecurityContextConstraints
apiVersion: security.openshift.io/v1
metadata:
  name: kserve-localmodel-permissions-scc
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities:
  - CHOWN
  - DAC_OVERRIDE
  - FOWNER
defaultAddCapabilities: null
fsGroup:
  type: RunAsAny
readOnlyRootFilesystem: true
requiredDropCapabilities:
  - FSETID
  - KILL
  - MKNOD
  - NET_BIND_SERVICE
  - NET_RAW
  - SETFCAP
  - SETGID
  - SETPCAP
  - SETUID
  - SYS_CHROOT
runAsUser:
  type: MustRunAs
  uid: 0
seLinuxContext:
  type: MustRunAs
  seLinuxOptions:
    type: spc_t
supplementalGroups:
  type: MustRunAs
  ranges:
    - min: 0
      max: 0
seccompProfiles:
  - runtime/default
volumes:
  - persistentVolumeClaim
